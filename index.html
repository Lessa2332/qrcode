<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇺🇦 QR Вишиванка | Український QR Designer</title>
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YELMN6CN7Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YELMN6CN7Q');
    </script>
    
    <!-- Використовуємо node-qrcode для кращої підтримки UTF-8 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    
    <style>
        :root {
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --bg: #1a1a2e;
            --panel: #16213e;
            --panel-hover: #1f3460;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --border: rgba(255,255,255,0.1);
            --vyshyvanka-red: #c41e3a;
            --vyshyvanka-black: #1a1a1a;
            --vyshyvanka-white: #f5f5f0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            max-width: 1100px;
            width: 100%;
            align-items: start;
        }
        
        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
        }
        
        .sidebar {
            background: var(--panel);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 1px solid rgba(196, 30, 58, 0.2);
        }
        
        .main-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid var(--border);
            min-height: 400px;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #c41e3a, #f5f5f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 20px;
        }
        
        .group { margin-bottom: 18px; }
        
        label {
            display: block;
            font-size: 0.7rem;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        input[type="file"] {
            font-size: 12px;
            color: var(--text-dim);
            width: 100%;
        }
        
        .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        input[type="color"] {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #0f172a;
            padding: 4px;
        }
        
        .file-upload-wrapper {
            border: 2px dashed #334155;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .file-upload-wrapper:hover { border-color: var(--accent); }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-size: 14px;
        }
        
        .btn-magic {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            color: white;
        }
        .btn-magic:hover {
            background: linear-gradient(135deg, #b91c1c, #7b0000);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196, 30, 58, 0.4);
        }
        
        .btn-download {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            color: white;
            margin-top: 20px;
            font-size: 15px;
        }
        .btn-download:hover {
            background: linear-gradient(135deg, #059669, #0d9488);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35);
            transform: translateY(-2px);
        }
        
        #qrcode-container {
            background: var(--vyshyvanka-white);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 350px;
            min-height: 350px;
            transition: all 0.3s;
            border: 3px solid var(--vyshyvanka-red);
        }
        
        #qrcode-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 100%;
            height: auto;
            max-width: 300px;
            border-radius: 10px;
        }
        
        .style-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .style-dot {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            background-size: cover;
            background-position: center;
        }
        .style-dot.active { 
            border-color: var(--accent); 
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(196, 30, 58, 0.5);
        }
        
        .hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
            line-height: 1.4;
        }
        
        .status {
            font-size: 12px;
            color: var(--success);
            margin-top: 8px;
            display: none;
        }
        .status.show { display: block; animation: fadeIn 0.3s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Стилі для прев'ю пресетів */
        .preset-traditional { 
            background: repeating-linear-gradient(45deg, #c41e3a, #c41e3a 4px, #f5f5f0 4px, #f5f5f0 8px);
        }
        .preset-modern { 
            background: linear-gradient(135deg, #1a1a2e, #c41e3a);
        }
        .preset-ethnic { 
            background: 
                linear-gradient(90deg, #c41e3a 2px, transparent 2px),
                linear-gradient(#c41e3a 2px, transparent 2px);
            background-size: 8px 8px;
            background-color: #f5f5f0;
        }
        .preset-minimal { 
            background: #1a1a1a;
        }
        .preset-festive { 
            background: conic-gradient(#c41e3a, #f5f5f0, #1a1a1a, #c41e3a);
        }
        .preset-custom { 
            background: radial-gradient(circle, #c41e3a, #8b0000);
        }

        .ornament-border {
            position: relative;
        }
        .ornament-border::before {
            content: '🇺🇦';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }

        .range-slider {
            width: 100%;
            margin-top: 8px;
        }
        .range-slider input {
            width: 100%;
            accent-color: var(--accent);
        }
        .range-value {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
            margin-top: 4px;
        }
        
        /* Прев'ю хрестиків */
        .cross-preview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
        }
        .cross-preview-item {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: var(--vyshyvanka-white);
            color: var(--vyshyvanka-red);
        }
        .cross-preview-item.active {
            border-color: var(--accent);
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(196, 30, 58, 0.4);
        }
        .cross-preview-item:hover {
            background: rgba(196, 30, 58, 0.1);
        }
        
        .test-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 12px;
            margin-top: 5px;
            display: inline-block;
        }
        .test-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar ornament-border">
        <h1>🇺🇦 QR Вишиванка</h1>
        <p class="subtitle">Український традиційний QR-код у стилі вишивки хрестиком</p>
        
        <div class="group">
            <label>🔗 Текст або URL (підтримує українську)</label>
            <textarea id="qrText" placeholder="Введіть текст українською або посилання...">https://example.com</textarea>
            <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                <a href="#" class="test-link" onclick="setTestUkrainian(); return false;">🇺🇦 Тест: "Слава Україні!"</a>
                <a href="#" class="test-link" onclick="setTestUrl(); return false;">🔗 Приклад URL</a>
            </div>
        </div>

        <div class="group">
            <label>🖼️ Логотип / Герб (опціонально)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="logoFile" accept="image/png, image/jpeg">
            </div>
            <p id="fileName" class="status">✅ Лого завантажено</p>
            <button class="btn" style="background: var(--panel-hover); margin-top: 5px;" onclick="clearLogo()">🗑️ Видалити лого</button>
        </div>

        <div class="group">
            <label>🎨 Стиль вишивки</label>
            <select id="stylePreset">
                <option value="traditional">🌹 Традиційний (Червоний)</option>
                <option value="modern">⚫ Сучасний (Чорний)</option>
                <option value="ethnic">🌾 Етнічний (Бежевий)</option>
                <option value="minimal">◻️ Мінімалізм</option>
                <option value="festive">🎉 Святковий</option>
                <option value="custom">✏️ Власний стиль</option>
            </select>
            <div class="style-preview">
                <div class="style-dot preset-traditional" onclick="setPreset('traditional')" title="Традиційний"></div>
                <div class="style-dot preset-modern" onclick="setPreset('modern')" title="Сучасний"></div>
                <div class="style-dot preset-ethnic" onclick="setPreset('ethnic')" title="Етнічний"></div>
                <div class="style-dot preset-minimal" onclick="setPreset('minimal')" title="Мінімалізм"></div>
                <div class="style-dot preset-festive" onclick="setPreset('festive')" title="Святковий"></div>
                <div class="style-dot preset-custom" onclick="setPreset('custom')" title="Власний"></div>
            </div>
        </div>

        <div class="group">
            <label>🧵 Тип хрестика</label>
            <select id="crossType">
                <option value="cross">✚ Простий хрестик</option>
                <option value="double">✜ Подвійний хрестик</option>
                <option value="filled">⬛ Заповнений</option>
                <option value="square">◻️ Квадратний</option>
            </select>
            <div class="cross-preview">
                <div class="cross-preview-item active" data-type="cross" onclick="setCrossType('cross')">✚</div>
                <div class="cross-preview-item" data-type="double" onclick="setCrossType('double')">✜</div>
                <div class="cross-preview-item" data-type="filled" onclick="setCrossType('filled')">⬛</div>
                <div class="cross-preview-item" data-type="square" onclick="setCrossType('square')">◻️</div>
            </div>
        </div>

        <div class="group">
            <label>🎨 Кольори</label>
            <div class="color-row">
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Нитки (основний)</label>
                    <input type="color" id="colorDark" value="#c41e3a">
                </div>
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Полотно (фон)</label>
                    <input type="color" id="colorLight" value="#f5f5f0">
                </div>
            </div>
        </div>

        <div class="group">
            <label>📐 Розмір модуля</label>
            <div class="range-slider">
                <input type="range" id="moduleSize" min="4" max="12" step="1" value="8">
                <div class="range-value">Розмір: <span id="moduleSizeValue">8</span> px</div>
            </div>
        </div>

        <button class="btn btn-magic" onclick="randomUkrainian()">🎲 Випадковий український стиль</button>
        <button class="btn" style="background: var(--panel-hover); color: white; margin-top: 8px;" onclick="resetColors()">🔄 Скинути налаштування</button>
    </div>

    <div class="main-view">
        <div id="qrcode-container">
            <canvas id="qrcode-canvas"></canvas>
        </div>
        <div style="width: 100%; max-width: 340px; margin-top: 24px;">
            <button class="btn btn-download" onclick="downloadPNG()">⬇️ Завантажити PNG</button>
            <p class="hint" style="text-align: center; margin-top: 12px;">
                🇺🇦 Тепер підтримує українську мову!<br>При скануванні відобразиться ваш текст.
            </p>
        </div>
    </div>
</div>

<script>
    // ==================== ГЛОБАЛЬНІ ЗМІННІ ====================
    let currentLogo = null;
    let logoImage = null;
    const canvas = document.getElementById('qrcode-canvas');
    const ctx = canvas.getContext('2d');

    // ==================== КОНФІГУРАЦІЯ СТИЛІВ ====================
    const STYLE_PRESETS = {
        traditional: {
            name: "Традиційний",
            baseColor: '#c41e3a',
            bgColor: '#f5f5f0'
        },
        modern: {
            name: "Сучасний",
            baseColor: '#1a1a1a',
            bgColor: '#ffffff'
        },
        ethnic: {
            name: "Етнічний",
            baseColor: '#8b4513',
            bgColor: '#f5e6d3'
        },
        minimal: {
            name: "Мінімалізм",
            baseColor: '#000000',
            bgColor: '#ffffff'
        },
        festive: {
            name: "Святковий",
            baseColor: '#c41e3a',
            bgColor: '#ffffff'
        },
        custom: {
            name: "Власний",
            baseColor: '#c41e3a',
            bgColor: '#f5f5f0'
        }
    };

    // ==================== ТИПИ ХРЕСТИКІВ ====================
    function drawCross(ctx, x, y, size, color, type) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = color;
        ctx.strokeStyle = color;
        ctx.lineWidth = Math.max(2, size / 3);
        
        const half = size / 2;
        const quarter = size / 4;
        
        switch(type) {
            case 'cross': // Простий хрестик
                ctx.beginPath();
                ctx.moveTo(-half, -half);
                ctx.lineTo(half, half);
                ctx.moveTo(half, -half);
                ctx.lineTo(-half, half);
                ctx.stroke();
                break;
                
            case 'double': // Подвійний хрестик
                ctx.beginPath();
                ctx.moveTo(-half, -half);
                ctx.lineTo(half, half);
                ctx.moveTo(half, -half);
                ctx.lineTo(-half, half);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(-quarter, -half);
                ctx.lineTo(quarter, half);
                ctx.moveTo(quarter, -half);
                ctx.lineTo(-quarter, half);
                ctx.strokeStyle = color;
                ctx.lineWidth = Math.max(1, size / 6);
                ctx.stroke();
                break;
                
            case 'filled': // Заповнений
                ctx.fillRect(-half, -half, size, size);
                ctx.fillStyle = 'white';
                ctx.fillRect(-quarter, -quarter, size/2, size/2);
                ctx.fillStyle = color;
                break;
                
            case 'square': // Квадратний
                ctx.strokeRect(-half, -half, size, size);
                break;
        }
        
        ctx.restore();
    }

    // ==================== ОСНОВНА ФУНКЦІЯ ГЕНЕРАЦІЇ ====================
    async function generateQR() {
        const text = document.getElementById('qrText').value.trim();
        if (!text) {
            alert('Будь ласка, введіть текст');
            return;
        }

        const colorDark = document.getElementById('colorDark').value;
        const colorLight = document.getElementById('colorLight').value;
        const crossType = document.getElementById('crossType').value;
        const moduleSize = parseInt(document.getElementById('moduleSize').value);

        // Оновлюємо відображення значень
        document.getElementById('moduleSizeValue').textContent = moduleSize;

        try {
            // Генеруємо матрицю QR-коду за допомогою бібліотеки qrcode
            const qrData = await QRCode.toString(text, {
                type: 'array',
                errorCorrectionLevel: 'H',
                margin: 2
            });

            // Встановлюємо розмір canvas
            const matrix = qrData; // Це масив 0/1
            const size = matrix.length;
            canvas.width = size * moduleSize + 40; // + margin
            canvas.height = size * moduleSize + 40;

            // Малюємо фон
            ctx.fillStyle = colorLight;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Малюємо QR-код з хрестиками
            const offset = 20; // margin
            
            for (let row = 0; row < size; row++) {
                for (let col = 0; col < size; col++) {
                    if (matrix[row][col] === 1) {
                        const x = offset + col * moduleSize + moduleSize / 2;
                        const y = offset + row * moduleSize + moduleSize / 2;
                        
                        // Малюємо хрестик
                        drawCross(ctx, x, y, moduleSize * 0.8, colorDark, crossType);
                    }
                }
            }

            // Додаємо логотип, якщо є
            if (logoImage) {
                const logoSize = moduleSize * 3; // Розмір лого
                const logoX = (canvas.width - logoSize) / 2;
                const logoY = (canvas.height - logoSize) / 2;
                
                // Малюємо білий фон для лого
                ctx.fillStyle = colorLight;
                ctx.fillRect(logoX - 5, logoY - 5, logoSize + 10, logoSize + 10);
                
                // Малюємо лого
                ctx.drawImage(logoImage, logoX, logoY, logoSize, logoSize);
            }

            // Оновлюємо стиль контейнера
            document.getElementById('qrcode-container').style.background = colorLight;
            document.getElementById('qrcode-container').style.borderColor = colorDark;

        } catch (error) {
            console.error('Error generating QR:', error);
            alert('Помилка генерації QR-коду: ' + error.message);
        }
    }

    // ==================== ФУНКЦІЇ УПРАВЛІННЯ ====================
    function applyPreset() {
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey];
        
        document.getElementById('colorDark').value = preset.baseColor;
        document.getElementById('colorLight').value = preset.bgColor;
        
        document.querySelectorAll('.style-dot').forEach(dot => dot.classList.remove('active'));
        const activeDot = document.querySelector(`.style-dot.preset-${presetKey}`);
        if (activeDot) activeDot.classList.add('active');
        
        generateQR();
    }

    function setPreset(key) {
        document.getElementById('stylePreset').value = key;
        applyPreset();
    }

    function setCrossType(type) {
        document.getElementById('crossType').value = type;
        updateCrossPreview(type);
        generateQR();
    }

    function updateCrossPreview(type) {
        document.querySelectorAll('.cross-preview-item').forEach(item => {
            item.classList.toggle('active', item.dataset.type === type);
        });
    }

    function randomUkrainian() {
        const ukrainian = ['traditional', 'ethnic', 'festive', 'modern'];
        const random = ukrainian[Math.floor(Math.random() * ukrainian.length)];
        setPreset(random);
    }

    function resetColors() {
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey];
        document.getElementById('colorDark').value = preset.baseColor;
        document.getElementById('colorLight').value = preset.bgColor;
        document.getElementById('moduleSize').value = 8;
        document.getElementById('moduleSizeValue').textContent = '8';
        document.getElementById('crossType').value = 'cross';
        updateCrossPreview('cross');
        clearLogo();
        generateQR();
    }

    // ==================== ТЕСТОВІ ФУНКЦІЇ ====================
    function setTestUkrainian() {
        document.getElementById('qrText').value = 'Слава Україні! Героям слава! 🇺🇦';
        generateQR();
    }

    function setTestUrl() {
        document.getElementById('qrText').value = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
        generateQR();
    }

    // ==================== ЗАВАНТАЖЕННЯ ФАЙЛІВ ====================
    function downloadPNG() {
        if (!canvas.width) {
            alert('QR-код ще не згенеровано');
            return;
        }
        
        gtag('event', 'download_qr', {
            'event_category': 'engagement',
            'event_label': 'PNG',
            'value': 1
        });
        
        const link = document.createElement('a');
        link.download = 'qr-vyshyvanka-' + Date.now() + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // ==================== ОБРОБКА ЛОГОТИПУ ====================
    document.getElementById('logoFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                logoImage = img;
                document.getElementById('fileName').classList.add('show');
                generateQR();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function clearLogo() {
        logoImage = null;
        document.getElementById('logoFile').value = '';
        document.getElementById('fileName').classList.remove('show');
        generateQR();
    }

    // ==================== LIVE-ОНОВЛЕННЯ ====================
    document.getElementById('qrText').addEventListener('input', generateQR);
    document.getElementById('colorDark').addEventListener('input', generateQR);
    document.getElementById('colorLight').addEventListener('input', generateQR);
    document.getElementById('moduleSize').addEventListener('input', generateQR);
    document.getElementById('stylePreset').addEventListener('change', applyPreset);
    document.getElementById('crossType').addEventListener('change', function() {
        updateCrossPreview(this.value);
        generateQR();
    });

    // ==================== ІНІЦІАЛІЗАЦІЯ ====================
    window.addEventListener('load', () => {
        document.querySelector('.style-dot.preset-traditional').classList.add('active');
        updateCrossPreview('cross');
        
        setTimeout(() => {
            if (typeof QRCode !== 'undefined') {
                generateQR();
            } else {
                console.error('QRCode library not loaded');
            }
        }, 500);
    });

    console.log('%c🇺🇦 QR Вишиванка з підтримкою української мови!', 'color: #c41e3a; font-size: 14px; font-weight: bold;');
</script>

</body>
</html>
