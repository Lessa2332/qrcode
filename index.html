<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇺🇦 QR Вишиванка | Український QR Designer</title>
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YELMN6CN7Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YELMN6CN7Q');
    </script>
    
    <!-- QR Code Styling Library -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.min.js"></script>
    
    <style>
        :root {
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --bg: #1a1a2e;
            --panel: #16213e;
            --panel-hover: #1f3460;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --border: rgba(255,255,255,0.1);
            --vyshyvanka-red: #c41e3a;
            --vyshyvanka-white: #f5f5f0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
            max-width: 1000px;
            width: 100%;
            align-items: start;
        }
        
        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
        }
        
        .sidebar {
            background: var(--panel);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 1px solid rgba(196, 30, 58, 0.2);
        }
        
        .main-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid var(--border);
            min-height: 400px;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #c41e3a, #f5f5f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 20px;
        }
        
        .group { margin-bottom: 18px; }
        
        label {
            display: block;
            font-size: 0.7rem;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        input[type="file"] {
            font-size: 12px;
            color: var(--text-dim);
            width: 100%;
        }
        
        .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        input[type="color"] {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #0f172a;
            padding: 4px;
        }
        
        .file-upload-wrapper {
            border: 2px dashed #334155;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .file-upload-wrapper:hover { border-color: var(--accent); }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-size: 14px;
        }
        
        .btn-magic {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            color: white;
        }
        .btn-magic:hover {
            background: linear-gradient(135deg, #b91c1c, #7b0000);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196, 30, 58, 0.4);
        }
        
        .btn-download {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            color: white;
            margin-top: 20px;
            font-size: 15px;
        }
        .btn-download:hover {
            background: linear-gradient(135deg, #059669, #0d9488);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35);
            transform: translateY(-2px);
        }
        
        #qrcode-container {
            background: var(--vyshyvanka-white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 320px;
            min-height: 320px;
            transition: all 0.3s;
            border: 3px solid var(--vyshyvanka-red);
        }
        
        .hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
            line-height: 1.4;
        }
        
        .status {
            font-size: 12px;
            color: var(--success);
            margin-top: 8px;
            display: none;
        }
        .status.show { display: block; animation: fadeIn 0.3s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .ornament-border {
            position: relative;
        }
        .ornament-border::before {
            content: '🇺🇦';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }

        .range-slider {
            width: 100%;
            margin-top: 8px;
        }
        .range-slider input {
            width: 100%;
            accent-color: var(--accent);
        }
        .range-value {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar ornament-border">
        <h1>🇺🇦 QR Вишиванка</h1>
        <p class="subtitle">Український QR-код у стилі вишивки хрестиком</p>
        
        <div class="group">
            <label>🔗 Текст або URL</label>
            <input type="text" id="qrText" value="https://example.com" placeholder="Введіть посилання...">
        </div>

        <div class="group">
            <label>🖼️ Логотип / Герб (опціонально)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="logoFile" accept="image/png, image/jpeg, image/svg+xml">
            </div>
            <p id="fileName" class="status">✅ Лого завантажено</p>
        </div>

        <div class="group">
            <label>🎨 Стиль вишивки</label>
            <select id="stylePreset" onchange="applyPreset()">
                <option value="traditional">🌹 Традиційний (Червоний)</option>
                <option value="modern">⚫ Сучасний (Чорний)</option>
                <option value="ethnic">🌾 Етнічний (Бежевий)</option>
                <option value="minimal">◻️ Мінімалізм</option>
                <option value="festive">🎉 Святковий градієнт</option>
                <option value="custom">✏️ Власні кольори</option>
            </select>
        </div>

        <div class="group">
            <label>🧵 Тип стібка</label>
            <select id="crossType" onchange="generateQR()">
                <option value="cross">✚ Хрестик (класика)</option>
                <option value="double">✜ Подвійний хрест</option>
                <option value="filled">✙ Заповнений</option>
                <option value="square">◈ Квадрат (вишивка)</option>
            </select>
            <p class="hint">💡 Хрестики найкраще видно при розмірі 85%+</p>
        </div>

        <div class="group">
            <label>🎨 Кольори</label>
            <div class="color-row">
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Нитки</label>
                    <input type="color" id="colorDark" value="#c41e3a">
                </div>
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Полотно</label>
                    <input type="color" id="colorLight" value="#f5f5f0">
                </div>
            </div>
        </div>

        <div class="group">
            <label>📐 Розмір елементів</label>
            <div class="range-slider">
                <input type="range" id="dotSize" min="0.6" max="1.0" step="0.05" value="0.9" oninput="generateQR()">
                <div class="range-value">Розмір: <span id="dotSizeValue">90</span>%</div>
            </div>
            <div class="range-slider" style="margin-top: 10px;">
                <input type="range" id="logoSize" min="0.1" max="0.4" step="0.05" value="0.25" oninput="generateQR()">
                <div class="range-value">Логотип: <span id="logoSizeValue">25</span>%</div>
            </div>
        </div>

        <button class="btn btn-magic" onclick="randomUkrainian()">🎲 Випадковий стиль</button>
        <button class="btn" style="background: var(--panel-hover); color: white; margin-top: 8px;" onclick="resetColors()">🔄 Скинути</button>
    </div>

    <div class="main-view">
        <div id="qrcode-container"></div>
        <div style="width: 100%; max-width: 340px; margin-top: 24px;">
            <button class="btn btn-download" onclick="downloadPNG()">⬇️ Завантажити PNG</button>
            <button class="btn" style="background: var(--panel-hover); color: white; margin-top: 10px;" onclick="downloadSVG()">⬇️ Завантажити SVG</button>
            <p class="hint" style="text-align: center; margin-top: 12px;">
                🇺🇦 SVG — для друку, PNG — для веб
            </p>
        </div>
    </div>
</div>

<script>
    // ==================== ПЕРЕВІРКА БІБЛІОТЕКИ ====================
    if (typeof QRCodeStyling === 'undefined') {
        console.error('❌ QRCodeStyling not loaded!');
    }

    // ==================== SVG ХРЕСТИКИ - ПРОСТЕ КОДУВАННЯ ====================
    // Ключова зміна: використовуємо data:image/svg+xml;base64 з простим кодуванням
    function getCrossSVG(color, type) {
        // Прибираємо # з кольору для SVG
        const safeColor = color.replace('#', '');
        
        const svgs = {
            // Простий хрестик - товсті лінії для кращої видимості
            cross: `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
                <line x1="20" y1="20" x2="80" y2="80" stroke="#${safeColor}" stroke-width="16" stroke-linecap="round"/>
                <line x1="80" y1="20" x2="20" y2="80" stroke="#${safeColor}" stroke-width="16" stroke-linecap="round"/>
            </svg>`,
            
            // Подвійний хрест
            double: `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
                <line x1="15" y1="15" x2="85" y2="85" stroke="#${safeColor}" stroke-width="12" stroke-linecap="round"/>
                <line x1="85" y1="15" x2="15" y2="85" stroke="#${safeColor}" stroke-width="12" stroke-linecap="round"/>
                <line x1="25" y1="25" x2="75" y2="75" stroke="#${safeColor}" stroke-width="12" stroke-linecap="round"/>
                <line x1="75" y1="25" x2="25" y2="75" stroke="#${safeColor}" stroke-width="12" stroke-linecap="round"/>
            </svg>`,
            
            // Заповнений хрест з крапкою
            filled: `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
                <line x1="20" y1="20" x2="80" y2="80" stroke="#${safeColor}" stroke-width="18" stroke-linecap="round"/>
                <line x1="80" y1="20" x2="20" y2="80" stroke="#${safeColor}" stroke-width="18" stroke-linecap="round"/>
                <circle cx="50" cy="50" r="10" fill="#${safeColor}"/>
            </svg>`,
            
            // Квадратний стібок (імітація вишивки)
            square: `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
                <rect x="20" y="20" width="60" height="60" fill="none" stroke="#${safeColor}" stroke-width="12" stroke-linejoin="round"/>
                <line x1="20" y1="20" x2="80" y2="80" stroke="#${safeColor}" stroke-width="8" stroke-linecap="round"/>
                <line x1="80" y1="20" x2="20" y2="80" stroke="#${safeColor}" stroke-width="8" stroke-linecap="round"/>
            </svg>`
        };
        
        return svgs[type] || svgs.cross;
    }

    // Кодування SVG у base64 для надійності
    function encodeSVGToBase64(svgString) {
        // Видаляємо зайві пробіли та переноси
        const compact = svgString.replace(/\s+/g, ' ').trim();
        // Кодуємо в base64
        const base64 = btoa(unescape(encodeURIComponent(compact)));
        return 'data:image/svg+xml;base64,' + base64;
    }

    // ==================== КОНФІГУРАЦІЯ СТИЛІВ ====================
    const STYLE_PRESETS = {
        traditional: {
            name: "Традиційний",
            color: '#c41e3a',
            bg: '#f5f5f0',
            crossType: 'cross'
        },
        modern: {
            name: "Сучасний",
            color: '#1a1a1a',
            bg: '#ffffff',
            crossType: 'square'
        },
        ethnic: {
            name: "Етнічний",
            color: '#8b4513',
            bg: '#f5e6d3',
            crossType: 'double'
        },
        minimal: {
            name: "Мінімалізм",
            color: '#000000',
            bg: '#ffffff',
            crossType: 'cross'
        },
        festive: {
            name: "Святковий",
            color: '#c41e3a',
            bg: '#ffffff',
            crossType: 'filled',
            gradient: true
        },
        custom: {
            name: "Власний",
            color: '#c41e3a',
            bg: '#f5f5f0',
            crossType: 'cross'
        }
    };

    // ==================== ІНІЦІАЛІЗАЦІЯ ====================
    let qrCode;
    let currentLogo = null;
    const container = document.getElementById('qrcode-container');

    // ==================== ОСНОВНА ФУНКЦІЯ ГЕНЕРАЦІЇ ====================
    function generateQR() {
        const text = document.getElementById('qrText').value.trim() || 'https://example.com';
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey] || STYLE_PRESETS.traditional;
        const customColor = document.getElementById('colorDark').value;
        const customBg = document.getElementById('colorLight').value;
        const crossType = document.getElementById('crossType').value;
        const dotSize = parseFloat(document.getElementById('dotSize').value);
        const logoSize = parseFloat(document.getElementById('logoSize').value);

        document.getElementById('dotSizeValue').textContent = Math.round(dotSize * 100);
        document.getElementById('logoSizeValue').textContent = Math.round(logoSize * 100);

        const finalColor = preset.color && presetKey !== 'custom' ? preset.color : customColor;
        const finalBg = preset.bg && presetKey !== 'custom' ? preset.bg : customBg;
        const finalCrossType = preset.crossType && presetKey !== 'custom' ? preset.crossType : crossType;

        // ✅ СТВОРЮЄМО SVG ХРЕСТИК З ПРАВИЛЬНИМ КОДУВАННЯМ
        let dotsOptions;
        
        if (preset.gradient && presetKey === 'festive') {
            // Для градієнта використовуємо вбудований тип
            dotsOptions = {
                type: 'rounded',
                gradient: {
                    type: 'radial',
                    colorStops: [
                        { offset: 0, color: '#c41e3a' },
                        { offset: 0.5, color: '#ffd700' },
                        { offset: 1, color: '#1a1a1a' }
                    ]
                }
            };
        } else {
            // ✅ Створюємо SVG і кодуємо в base64
            const svgString = getCrossSVG(finalColor, finalCrossType);
            const encodedSvg = encodeSVGToBase64(svgString);
            
            dotsOptions = {
                type: 'image',
                image: encodedSvg,
                imageSize: dotSize
            };
        }

        const qrConfig = {
            width: 500,
            height: 500,
            type: 'canvas',
            data: text,
            margin: 20,
            qrOptions: { 
                typeNumber: 0,
                mode: 'Byte',
                errorCorrectionLevel: 'H'
            },
            imageOptions: {
                hideBackgroundDots: true,
                imageSize: logoSize,
                crossOrigin: 'anonymous',
                backgroundColor: finalBg
            },
            dotsOptions: dotsOptions,
            cornersSquareOptions: {
                type: 'square',
                color: finalColor
            },
            cornersDotOptions: {
                type: 'square',
                color: finalColor
            },
            backgroundOptions: {
                color: finalBg
            }
        };

        if (currentLogo) {
            qrConfig.image = currentLogo;
        }

        try {
            if (qrCode) {
                qrCode.update(qrConfig);
            } else {
                qrCode = new QRCodeStyling(qrConfig);
                qrCode.append(container);
            }
        } catch (error) {
            console.error('QR generation error:', error);
            // Fallback на квадрати
            qrConfig.dotsOptions = { type: 'square', color: finalColor };
            if (qrCode) {
                qrCode.update(qrConfig);
            } else {
                qrCode = new QRCodeStyling(qrConfig);
                qrCode.append(container);
            }
        }

        container.style.background = finalBg;
        container.style.borderColor = finalColor;
    }

    // ==================== ФУНКЦІЇ УПРАВЛІННЯ ====================
    function applyPreset() {
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey];
        
        if (preset.color && presetKey !== 'custom') {
            document.getElementById('colorDark').value = preset.color;
        }
        if (preset.bg && presetKey !== 'custom') {
            document.getElementById('colorLight').value = preset.bg;
        }
        if (preset.crossType && presetKey !== 'custom') {
            document.getElementById('crossType').value = preset.crossType;
        }
        
        generateQR();
    }

    function randomUkrainian() {
        const styles = ['traditional', 'ethnic', 'festive', 'modern'];
        const random = styles[Math.floor(Math.random() * styles.length)];
        document.getElementById('stylePreset').value = random;
        applyPreset();
    }

    function resetColors() {
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey];
        document.getElementById('colorDark').value = preset.color;
        document.getElementById('colorLight').value = preset.bg;
        document.getElementById('crossType').value = preset.crossType;
        document.getElementById('dotSize').value = 0.9;
        document.getElementById('logoSize').value = 0.25;
        generateQR();
    }

    // ==================== ЗАВАНТАЖЕННЯ ====================
    function downloadPNG() {
        if (!qrCode) { alert('QR ще не згенеровано'); return; }
        gtag('event', 'download_qr', { event_category: 'engagement', event_label: 'PNG' });
        qrCode.download({ extension: 'png', name: 'qr-vyshyvanka-' + Date.now(), width: 1000, height: 1000 });
    }

    function downloadSVG() {
        if (!qrCode) { alert('QR ще не згенеровано'); return; }
        gtag('event', 'download_qr', { event_category: 'engagement', event_label: 'SVG' });
        qrCode.download({ extension: 'svg', name: 'qr-vyshyvanka-' + Date.now() });
    }

    // ==================== ЛОГОТИП ====================
    document.getElementById('logoFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            currentLogo = event.target.result;
            document.getElementById('fileName').classList.add('show');
            generateQR();
        };
        reader.readAsDataURL(file);
    });

    // ==================== LIVE-ОНОВЛЕННЯ ====================
    document.getElementById('qrText').addEventListener('input', generateQR);
    document.getElementById('colorDark').addEventListener('input', generateQR);
    document.getElementById('colorLight').addEventListener('input', generateQR);
    document.getElementById('crossType').addEventListener('change', generateQR);
    document.getElementById('dotSize').addEventListener('input', generateQR);

    // ==================== ІНІЦІАЛІЗАЦІЯ ====================
    window.addEventListener('load', () => {
        setTimeout(() => {
            if (typeof QRCodeStyling !== 'undefined') {
                generateQR();
            } else {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.min.js';
                script.onload = generateQR;
                document.head.appendChild(script);
            }
        }, 300);
    });

    console.log('%c🇺🇦 QR Вишиванка готовий!', 'color: #c41e3a; font-weight: bold;');
    console.log('%c💡 Хрестики мають бути видно при розмірі 85%+', 'color: #94a3b8;');
</script>

</body>
</html>
