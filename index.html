<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇺🇦 QR Вишиванка | Український QR Designer</title>
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YELMN6CN7Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YELMN6CN7Q');
    </script>
    
    <!-- QR Code Styling Library - ВИПРАВЛЕНО URL -->
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.min.js"></script>
    
    <style>
        :root {
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --bg: #1a1a2e;
            --panel: #16213e;
            --panel-hover: #1f3460;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --border: rgba(255,255,255,0.1);
            --vyshyvanka-red: #c41e3a;
            --vyshyvanka-black: #1a1a1a;
            --vyshyvanka-white: #f5f5f0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            max-width: 1100px;
            width: 100%;
            align-items: start;
        }
        
        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
        }
        
        .sidebar {
            background: var(--panel);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 1px solid rgba(196, 30, 58, 0.2);
        }
        
        .main-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid var(--border);
            min-height: 400px;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #c41e3a, #f5f5f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 20px;
        }
        
        .group { margin-bottom: 18px; }
        
        label {
            display: block;
            font-size: 0.7rem;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        input[type="file"] {
            font-size: 12px;
            color: var(--text-dim);
            width: 100%;
        }
        
        .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        input[type="color"] {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #0f172a;
            padding: 4px;
        }
        
        .file-upload-wrapper {
            border: 2px dashed #334155;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .file-upload-wrapper:hover { border-color: var(--accent); }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-size: 14px;
        }
        
        .btn-magic {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            color: white;
        }
        .btn-magic:hover {
            background: linear-gradient(135deg, #b91c1c, #7b0000);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196, 30, 58, 0.4);
        }
        
        .btn-download {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            color: white;
            margin-top: 20px;
            font-size: 15px;
        }
        .btn-download:hover {
            background: linear-gradient(135deg, #059669, #0d9488);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35);
            transform: translateY(-2px);
        }
        
        #qrcode-container {
            background: var(--vyshyvanka-white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 350px;
            min-height: 350px;
            transition: all 0.3s;
            border: 3px solid var(--vyshyvanka-red);
        }
        
        .style-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .style-dot {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            background-size: cover;
            background-position: center;
        }
        .style-dot.active { 
            border-color: var(--accent); 
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(196, 30, 58, 0.5);
        }
        
        .hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
            line-height: 1.4;
        }
        
        .status {
            font-size: 12px;
            color: var(--success);
            margin-top: 8px;
            display: none;
        }
        .status.show { display: block; animation: fadeIn 0.3s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Стилі для прев'ю пресетів */
        .preset-traditional { 
            background: repeating-linear-gradient(45deg, #c41e3a, #c41e3a 4px, #f5f5f0 4px, #f5f5f0 8px);
        }
        .preset-modern { 
            background: linear-gradient(135deg, #1a1a2e, #c41e3a);
        }
        .preset-ethnic { 
            background: 
                linear-gradient(90deg, #c41e3a 2px, transparent 2px),
                linear-gradient(#c41e3a 2px, transparent 2px);
            background-size: 8px 8px;
            background-color: #f5f5f0;
        }
        .preset-minimal { 
            background: #1a1a1a;
        }
        .preset-festive { 
            background: conic-gradient(#c41e3a, #f5f5f0, #1a1a1a, #c41e3a);
        }
        .preset-custom { 
            background: radial-gradient(circle, #c41e3a, #8b0000);
        }

        .ornament-border {
            position: relative;
        }
        .ornament-border::before {
            content: '🇺';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }

        .range-slider {
            width: 100%;
            margin-top: 8px;
        }
        .range-slider input {
            width: 100%;
            accent-color: var(--accent);
        }
        .range-value {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar ornament-border">
        <h1>🇺🇦 QR Вишиванка</h1>
        <p class="subtitle">Український традиційний QR-код у стилі вишивки хрестиком</p>
        
        <div class="group">
            <label>🔗 Текст або URL</label>
            <input type="text" id="qrText" value="https://example.com" placeholder="Введіть посилання...">
        </div>

        <div class="group">
            <label>🖼️ Логотип / Герб (опціонально)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="logoFile" accept="image/png, image/jpeg, image/svg+xml">
            </div>
            <p id="fileName" class="status">✅ Лого завантажено</p>
        </div>

        <div class="group">
            <label>🎨 Стиль вишивки</label>
            <select id="stylePreset" onchange="applyPreset()">
                <option value="traditional">🌹 Традиційний (Червоний)</option>
                <option value="modern">⚫ Сучасний (Чорний)</option>
                <option value="ethnic">🌾 Етнічний (Бежевий)</option>
                <option value="minimal">◻️ Мінімалізм</option>
                <option value="festive">🎉 Святковий</option>
                <option value="custom">✏️ Власний стиль</option>
            </select>
            <div class="style-preview">
                <div class="style-dot preset-traditional" onclick="setPreset('traditional')" title="Традиційний"></div>
                <div class="style-dot preset-modern" onclick="setPreset('modern')" title="Сучасний"></div>
                <div class="style-dot preset-ethnic" onclick="setPreset('ethnic')" title="Етнічний"></div>
                <div class="style-dot preset-minimal" onclick="setPreset('minimal')" title="Мінімалізм"></div>
                <div class="style-dot preset-festive" onclick="setPreset('festive')" title="Святковий"></div>
                <div class="style-dot preset-custom" onclick="setPreset('custom')" title="Власний"></div>
            </div>
        </div>

        <div class="group">
            <label>🧵 Тип хрестика</label>
            <select id="crossType" onchange="generateQR()">
                <option value="simple">Простий хрестик</option>
                <option value="double">Подвійний хрестик</option>
                <option value="filled">Заповнений</option>
                <option value="square">Квадратний стібок</option>
            </select>
        </div>

        <div class="group">
            <label>🎨 Кольори</label>
            <div class="color-row">
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Нитки (основний)</label>
                    <input type="color" id="colorDark" value="#c41e3a">
                </div>
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Полотно (фон)</label>
                    <input type="color" id="colorLight" value="#f5f5f0">
                </div>
            </div>
        </div>

        <div class="group">
            <label>📐 Розмір елементів</label>
            <div class="range-slider">
                <input type="range" id="dotSize" min="0.3" max="1.0" step="0.05" value="0.7" oninput="generateQR()">
                <div class="range-value">Розмір: <span id="dotSizeValue">70</span>%</div>
            </div>
            <div class="range-slider" style="margin-top: 10px;">
                <input type="range" id="logoSize" min="0.1" max="0.5" step="0.05" value="0.25" oninput="generateQR()">
                <div class="range-value">Логотип: <span id="logoSizeValue">25</span>%</div>
            </div>
        </div>

        <button class="btn btn-magic" onclick="randomUkrainian()">🎲 Випадковий український стиль</button>
        <button class="btn" style="background: var(--panel-hover); color: white; margin-top: 8px;" onclick="resetColors()">🔄 Скинути налаштування</button>
    </div>

    <div class="main-view">
        <div id="qrcode-container"></div>
        <div style="width: 100%; max-width: 340px; margin-top: 24px;">
            <button class="btn btn-download" onclick="downloadPNG()">⬇️ Завантажити PNG</button>
            <button class="btn" style="background: var(--panel-hover); color: white; margin-top: 10px;" onclick="downloadSVG()">⬇️ Завантажити SVG (для друку)</button>
            <p class="hint" style="text-align: center; margin-top: 12px;">
                🇺 SVG — векторний формат, ідеальний для друку на вишиванках, пакетах, візитках
            </p>
        </div>
    </div>
</div>

<script>
    // ==================== ПЕРЕВІРКА ЗАВАНТАЖЕННЯ БІБЛІОТЕКИ ====================
    if (typeof QRCodeStyling === 'undefined') {
        alert('❌ Помилка: Бібліотека QRCodeStyling не завантажилась!\n\nПеревірте підключення до інтернету або оновіть сторінку (Ctrl+F5)');
        console.error('QRCodeStyling library not loaded!');
    }

    // ==================== SVG ПАТЕРНИ УКРАЇНСЬКИХ ХРЕСТИКІВ ====================
    // ВИПРАВЛЕНО: правильне кодування SVG
    const CROSS_PATTERNS = {
        simple: 'data:image/svg+xml;utf8,' + encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <path d="M20 20 L80 80 M80 20 L20 80" stroke="#CURRENT_COLOR" stroke-width="12" stroke-linecap="round" fill="none"/>
            </svg>
        `.replace(/#/g, '%23').replace(/\s+/g, '')),
        
        double: 'data:image/svg+xml;utf8,' + encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <path d="M15 15 L85 85 M85 15 L15 85" stroke="#CURRENT_COLOR" stroke-width="10" stroke-linecap="round" fill="none"/>
                <path d="M25 25 L75 75 M75 25 L25 75" stroke="#CURRENT_COLOR" stroke-width="10" stroke-linecap="round" fill="none"/>
            </svg>
        `.replace(/#/g, '%23').replace(/\s+/g, '')),
        
        filled: 'data:image/svg+xml;utf8,' + encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <path d="M20 20 L80 80 M80 20 L20 80" stroke="#CURRENT_COLOR" stroke-width="15" stroke-linecap="round" fill="none"/>
                <circle cx="50" cy="50" r="8" fill="#CURRENT_COLOR"/>
            </svg>
        `.replace(/#/g, '%23').replace(/\s+/g, '')),
        
        square: 'data:image/svg+xml;utf8,' + encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <rect x="25" y="25" width="50" height="50" fill="none" stroke="#CURRENT_COLOR" stroke-width="10"/>
                <path d="M25 25 L75 75 M75 25 L25 75" stroke="#CURRENT_COLOR" stroke-width="8" stroke-linecap="round"/>
            </svg>
        `.replace(/#/g, '%23').replace(/\s+/g, ''))
    };

    // ==================== КОНФІГУРАЦІЯ СТИЛІВ ====================
    const STYLE_PRESETS = {
        traditional: {
            name: "Традиційний",
            dotsOptions: { color: '#c41e3a' },
            cornersSquareOptions: { type: 'square', color: '#c41e3a' },
            cornersDotOptions: { type: 'square', color: '#c41e3a' },
            backgroundOptions: { color: '#f5f5f0' },
            imageOptions: { backgroundColor: '#f5f5f0', margin: 0 },
            crossType: 'simple'
        },
        modern: {
            name: "Сучасний",
            dotsOptions: { color: '#1a1a1a' },
            cornersSquareOptions: { type: 'square', color: '#1a1a1a' },
            cornersDotOptions: { type: 'square', color: '#1a1a1a' },
            backgroundOptions: { color: '#ffffff' },
            imageOptions: { backgroundColor: '#ffffff', margin: 0 },
            crossType: 'simple'
        },
        ethnic: {
            name: "Етнічний",
            dotsOptions: { color: '#8b4513' },
            cornersSquareOptions: { type: 'square', color: '#8b4513' },
            cornersDotOptions: { type: 'square', color: '#8b4513' },
            backgroundOptions: { color: '#f5e6d3' },
            imageOptions: { backgroundColor: '#f5e6d3', margin: 0 },
            crossType: 'double'
        },
        minimal: {
            name: "Мінімалізм",
            dotsOptions: { color: '#000000' },
            cornersSquareOptions: { type: 'square', color: '#000000' },
            cornersDotOptions: { type: 'square', color: '#000000' },
            backgroundOptions: { color: '#ffffff' },
            imageOptions: { backgroundColor: '#ffffff', margin: 0 },
            crossType: 'square'
        },
        festive: {
            name: "Святковий",
            dotsOptions: { 
                gradient: { 
                    type: 'radial', 
                    colorStops: [
                        { offset: 0, color: '#c41e3a' }, 
                        { offset: 0.5, color: '#ffd700' }, 
                        { offset: 1, color: '#1a1a1a' }
                    ] 
                } 
            },
            cornersSquareOptions: { type: 'square', color: '#c41e3a' },
            cornersDotOptions: { type: 'square', color: '#ffd700' },
            backgroundOptions: { color: '#ffffff' },
            imageOptions: { backgroundColor: '#ffffff', margin: 0 },
            crossType: 'filled'
        },
        custom: {
            name: "Власний",
            dotsOptions: { color: '#c41e3a' },
            cornersSquareOptions: { type: 'square', color: '#c41e3a' },
            cornersDotOptions: { type: 'square', color: '#c41e3a' },
            backgroundOptions: { color: '#f5f5f0' },
            imageOptions: { backgroundColor: '#f5f5f0', margin: 0 },
            crossType: 'simple'
        }
    };

    // ==================== ІНІЦІАЛІЗАЦІЯ ====================
    let qrCode;
    let currentLogo = null;
    const container = document.getElementById('qrcode-container');

    // ==================== ОСНОВНА ФУНКЦІЯ ГЕНЕРАЦІЇ ====================
    function generateQR() {
        const text = document.getElementById('qrText').value.trim() || 'https://example.com';
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey] || STYLE_PRESETS.traditional;
        const customColorDark = document.getElementById('colorDark').value;
        const customColorLight = document.getElementById('colorLight').value;
        const crossType = document.getElementById('crossType').value;
        const dotSize = parseFloat(document.getElementById('dotSize').value);
        const logoSize = parseFloat(document.getElementById('logoSize').value);

        // Оновлюємо відображення значень повзунків
        document.getElementById('dotSizeValue').textContent = Math.round(dotSize * 100);
        document.getElementById('logoSizeValue').textContent = Math.round(logoSize * 100);

        // Глибоке копіювання конфігурації
        const config = JSON.parse(JSON.stringify(preset));
        
        // Застосовуємо кастомні кольори
        if (!config.dotsOptions.gradient) {
            config.dotsOptions.color = customColorDark;
            config.cornersSquareOptions.color = customColorDark;
            config.cornersDotOptions.color = customColorDark;
        }
        config.backgroundOptions.color = customColorLight;
        config.imageOptions.backgroundColor = customColorLight;

        // Використовуємо SVG патерн хрестика
        const selectedCrossType = document.getElementById('stylePreset').value === 'custom' ? crossType : preset.crossType || crossType;
        
        // Створюємо SVG з правильним кольором
        let patternSvg = CROSS_PATTERNS[selectedCrossType] || CROSS_PATTERNS.simple;
        patternSvg = patternSvg.replace(/#CURRENT_COLOR/g, customColorDark.replace('#', '%23'));
        
        config.dotsOptions = {
            type: 'image',
            image: patternSvg,
            imageSize: dotSize
        };

        // Формуємо фінальну конфігурацію - ВИПРАВЛЕНО РОЗМІР
        const qrConfig = {
            width: 600,  // ЗБІЛЬШЕНО з 500 до 600
            height: 600, // ЗБІЛЬШЕНО з 500 до 600
            type: 'canvas',
            data: text,
            margin: 20, // ЗБІЛЬШЕНО відступ
            qrOptions: { 
                typeNumber: 0, 
                mode: 'Byte', 
                errorCorrectionLevel: 'H' 
            },
            imageOptions: {
                ...config.imageOptions,
                hideBackgroundDots: true,
                imageSize: logoSize,
                crossOrigin: 'anonymous'
            },
            dotsOptions: config.dotsOptions,
            cornersSquareOptions: config.cornersSquareOptions,
            cornersDotOptions: config.cornersDotOptions,
            backgroundOptions: config.backgroundOptions
        };

        // Додаємо лого, якщо завантажено
        if (currentLogo) {
            qrConfig.image = currentLogo;
        }

        // Оновлюємо або створюємо новий екземпляр
        try {
            if (qrCode) {
                qrCode.update(qrConfig);
            } else {
                qrCode = new QRCodeStyling(qrConfig);
                qrCode.append(container);
            }
        } catch (error) {
            console.error('Error generating QR:', error);
            alert('❌ Помилка генерації QR-коду. Перевірте консоль (F12)');
        }

        // Застосовуємо стиль контейнера
        container.style.background = config.backgroundOptions.color;
        container.style.borderColor = customColorDark;
    }

    // ==================== ФУНКЦІЇ УПРАВЛІННЯ ====================
    function applyPreset() {
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey];
        
        // Оновлюємо кольори в інпутах
        if (preset.dotsOptions.color && !preset.dotsOptions.gradient) {
            document.getElementById('colorDark').value = preset.dotsOptions.color;
        }
        document.getElementById('colorLight').value = preset.backgroundOptions.color;
        
        // Оновлюємо тип хрестика
        if (preset.crossType) {
            document.getElementById('crossType').value = preset.crossType;
        }
        
        // Підсвічуємо активний пресет
        document.querySelectorAll('.style-dot').forEach(dot => dot.classList.remove('active'));
        const activeDot = document.querySelector(`.style-dot.preset-${presetKey}`);
        if (activeDot) activeDot.classList.add('active');
        
        generateQR();
    }

    function setPreset(key) {
        document.getElementById('stylePreset').value = key;
        applyPreset();
    }

    function randomUkrainian() {
        const ukrainian = ['traditional', 'ethnic', 'festive', 'modern'];
        const random = ukrainian[Math.floor(Math.random() * ukrainian.length)];
        setPreset(random);
    }

    function resetColors() {
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey];
        document.getElementById('colorDark').value = preset.dotsOptions.color || '#c41e3a';
        document.getElementById('colorLight').value = preset.backgroundOptions.color || '#f5f5f0';
        document.getElementById('dotSize').value = 0.7;
        document.getElementById('logoSize').value = 0.25;
        generateQR();
    }

    // ==================== ЗАВАНТАЖЕННЯ ФАЙЛІВ ====================
    function downloadPNG() {
        if (!qrCode) {
            alert('QR-код ще не згенеровано');
            return;
        }
        // 📊 GA4 Event: Завантаження PNG
        gtag('event', 'download_qr', {
            'event_category': 'engagement',
            'event_label': 'PNG',
            'value': 1
        });
        
        qrCode.download({ 
            extension: 'png', 
            name: 'qr-vyshyvanka-' + Date.now(),
            width: 1000,
            height: 1000
        });
    }

    function downloadSVG() {
        if (!qrCode) {
            alert('QR-код ще не згенеровано');
            return;
        }
        // 📊 GA4 Event: Завантаження SVG
        gtag('event', 'download_qr', {
            'event_category': 'engagement',
            'event_label': 'SVG',
            'value': 1
        });
        
        qrCode.download({ 
            extension: 'svg', 
            name: 'qr-vyshyvanka-' + Date.now()
        });
    }

    // ==================== ОБРОБКА ЛОГОТИПУ ====================
    document.getElementById('logoFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            currentLogo = event.target.result;
            document.getElementById('fileName').classList.add('show');
            generateQR();
        };
        reader.readAsDataURL(file);
    });

    // ==================== LIVE-ОНОВЛЕННЯ ====================
    document.getElementById('qrText').addEventListener('input', generateQR);
    document.getElementById('colorDark').addEventListener('input', generateQR);
    document.getElementById('colorLight').addEventListener('input', generateQR);

    // ==================== ІНІЦІАЛІЗАЦІЯ ====================
    window.addEventListener('load', () => {
        document.querySelector('.style-dot.preset-traditional').classList.add('active');
        // Затримка для завантаження бібліотеки
        setTimeout(() => {
            if (typeof QRCodeStyling !== 'undefined') {
                generateQR();
            } else {
                console.error('QRCodeStyling not loaded after timeout');
                alert('Бібліотека не завантажилась. Оновіть сторінку (Ctrl+F5)');
            }
        }, 500);
    });

    // ==================== КОНСОЛЬ ====================
    console.log('%c🇺 QR Вишиванка готовий!', 'color: #c41e3a; font-size: 14px; font-weight: bold;');
    console.log("%c💡 Створено з любов'ю до української культури", 'color: #94a3b8; font-size: 11px;');
    console.log('%c📊 Перевірка бібліотеки:', 'color: #10b981;', typeof QRCodeStyling);
</script>

</body>
