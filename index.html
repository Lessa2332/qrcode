<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇺🇦 QR Вишиванка | Український QR Designer</title>
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YELMN6CN7Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YELMN6CN7Q');
    </script>
    
    <!-- Використовуємо сучасну бібліотеку з підтримкою Unicode -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    
    <style>
        :root {
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --bg: #1a1a2e;
            --panel: #16213e;
            --panel-hover: #1f3460;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --border: rgba(255,255,255,0.1);
            --vyshyvanka-red: #c41e3a;
            --vyshyvanka-black: #1a1a1a;
            --vyshyvanka-white: #f5f5f0;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            max-width: 1100px;
            width: 100%;
            align-items: start;
        }
        
        @media (max-width: 900px) {
            .app-container { 
                grid-template-columns: 1fr; 
            }
        }
        
        /* Сайдбар */
        .sidebar {
            background: var(--panel);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 1px solid rgba(196, 30, 58, 0.2);
        }
        
        .main-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid var(--border);
            min-height: 400px;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #c41e3a, #f5f5f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 20px;
        }
        
        .group { 
            margin-bottom: 18px; 
        }
        
        label {
            display: block;
            font-size: 0.7rem;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        textarea, select, input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        textarea:focus, select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.2);
        }
        
        .color-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        
        input[type="color"] {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #0f172a;
            padding: 4px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-size: 14px;
        }
        
        .btn-magic {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            color: white;
        }
        
        .btn-magic:hover {
            background: linear-gradient(135deg, #b91c1c, #7b0000);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196, 30, 58, 0.4);
        }
        
        .btn-download {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            color: white;
            margin-top: 20px;
            font-size: 15px;
        }
        
        .btn-download:hover {
            background: linear-gradient(135deg, #059669, #0d9488);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: var(--panel-hover);
            color: white;
        }
        
        .btn-secondary:hover {
            background: #2a3f7a;
            transform: translateY(-2px);
        }
        
        #qrcode-container {
            background: var(--vyshyvanka-white);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 350px;
            min-height: 350px;
            transition: all 0.3s;
            border: 3px solid var(--vyshyvanka-red);
        }
        
        #qr-canvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            image-rendering: pixelated;
        }
        
        .style-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        
        .style-dot {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            background-size: cover;
            background-position: center;
        }
        
        .style-dot.active { 
            border-color: var(--accent); 
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(196, 30, 58, 0.5);
        }
        
        .preset-traditional { 
            background: repeating-linear-gradient(45deg, #c41e3a, #c41e3a 4px, #f5f5f0 4px, #f5f5f0 8px);
        }
        
        .preset-modern { 
            background: linear-gradient(135deg, #1a1a2e, #c41e3a);
        }
        
        .preset-ethnic { 
            background: 
                linear-gradient(90deg, #c41e3a 2px, transparent 2px),
                linear-gradient(#c41e3a 2px, transparent 2px);
            background-size: 8px 8px;
            background-color: #f5f5f0;
        }
        
        .preset-minimal { 
            background: #1a1a1a;
        }
        
        .preset-festive { 
            background: conic-gradient(#c41e3a, #f5f5f0, #1a1a1a, #c41e3a);
        }
        
        .preset-custom { 
            background: radial-gradient(circle, #c41e3a, #8b0000);
        }
        
        .ornament-border {
            position: relative;
        }
        
        .ornament-border::before {
            content: '🇺🇦';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }
        
        .range-slider {
            width: 100%;
            margin-top: 8px;
        }
        
        .range-slider input {
            width: 100%;
            accent-color: var(--accent);
        }
        
        .range-value {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
            margin-top: 4px;
        }
        
        .cross-preview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
        }
        
        .cross-preview-item {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: var(--vyshyvanka-white);
            color: var(--vyshyvanka-red);
        }
        
        .cross-preview-item.active {
            border-color: var(--accent);
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(196, 30, 58, 0.4);
        }
        
        .cross-preview-item:hover {
            background: rgba(196, 30, 58, 0.1);
        }
        
        .test-links {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        
        .test-link {
            flex: 1;
            padding: 8px;
            background: #1f3460;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            border: none;
        }
        
        .test-link:hover {
            background: #2a3f7a;
        }
        
        .status {
            font-size: 12px;
            color: var(--success);
            margin-top: 8px;
            display: none;
        }
        
        .status.show { 
            display: block; 
            animation: fadeIn 0.3s; 
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
            line-height: 1.4;
            text-align: center;
        }
        
        .footer {
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
        }
        
        .file-upload-wrapper {
            border: 2px dashed #334155;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 10px;
        }
        
        .file-upload-wrapper:hover { 
            border-color: var(--accent); 
        }
        
        input[type="file"] {
            font-size: 12px;
            color: var(--text-dim);
            width: 100%;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Ліва панель - налаштування -->
    <div class="sidebar ornament-border">
        <h1>🇺🇦 QR Вишиванка</h1>
        <p class="subtitle">Український QR-код у стилі вишивки хрестиком</p>
        
        <!-- Тестові посилання -->
        <div class="test-links">
            <button class="test-link" onclick="setText('Слава Україні! Героям слава! 🇺🇦')">🇺🇦 Тест</button>
            <button class="test-link" onclick="setText('Привіт, як справи?')">👋 Привіт</button>
            <button class="test-link" onclick="setText('https://www.google.com')">🔗 URL</button>
        </div>
        
        <!-- Поле для тексту -->
        <div class="group">
            <label>🔗 Текст або URL (повна підтримка української)</label>
            <textarea id="qrText" placeholder="Введіть текст українською...">Слава Україні! Героям слава! 🇺🇦</textarea>
        </div>

        <!-- Завантаження логотипу -->
        <div class="group">
            <label>🖼️ Логотип / Герб (опціонально)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="logoFile" accept="image/png, image/jpeg">
            </div>
            <p id="fileName" class="status">✅ Лого завантажено</p>
            <button class="btn btn-secondary" onclick="clearLogo()" style="margin-top: 5px;">🗑️ Видалити лого</button>
        </div>

        <!-- Пресети стилів -->
        <div class="group">
            <label>🎨 Стиль вишивки</label>
            <select id="stylePreset">
                <option value="traditional">🌹 Традиційний (Червоний)</option>
                <option value="modern">⚫ Сучасний (Чорний)</option>
                <option value="ethnic">🌾 Етнічний (Бежевий)</option>
                <option value="minimal">◻️ Мінімалізм</option>
                <option value="festive">🎉 Святковий</option>
                <option value="custom">✏️ Власний стиль</option>
            </select>
            <div class="style-preview">
                <div class="style-dot preset-traditional" onclick="setPreset('traditional')" title="Традиційний"></div>
                <div class="style-dot preset-modern" onclick="setPreset('modern')" title="Сучасний"></div>
                <div class="style-dot preset-ethnic" onclick="setPreset('ethnic')" title="Етнічний"></div>
                <div class="style-dot preset-minimal" onclick="setPreset('minimal')" title="Мінімалізм"></div>
                <div class="style-dot preset-festive" onclick="setPreset('festive')" title="Святковий"></div>
                <div class="style-dot preset-custom" onclick="setPreset('custom')" title="Власний"></div>
            </div>
        </div>

        <!-- Тип хрестика -->
        <div class="group">
            <label>🧵 Тип хрестика</label>
            <select id="crossType">
                <option value="cross">✚ Простий хрестик</option>
                <option value="double">✜ Подвійний хрестик</option>
                <option value="filled">⬛ Заповнений хрестик</option>
                <option value="square">◻️ Квадратний стібок</option>
            </select>
            <div class="cross-preview">
                <div class="cross-preview-item active" data-type="cross" onclick="setCrossType('cross')">✚</div>
                <div class="cross-preview-item" data-type="double" onclick="setCrossType('double')">✜</div>
                <div class="cross-preview-item" data-type="filled" onclick="setCrossType('filled')">⬛</div>
                <div class="cross-preview-item" data-type="square" onclick="setCrossType('square')">◻️</div>
            </div>
        </div>

        <!-- Кольори -->
        <div class="group">
            <label>🎨 Кольори</label>
            <div class="color-row">
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Нитки (основний)</label>
                    <input type="color" id="colorDark" value="#c41e3a">
                </div>
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Полотно (фон)</label>
                    <input type="color" id="colorLight" value="#f5f5f0">
                </div>
            </div>
        </div>

        <!-- Розмір -->
        <div class="group">
            <label>📐 Розмір модуля</label>
            <div class="range-slider">
                <input type="range" id="moduleSize" min="4" max="12" step="1" value="8">
                <div class="range-value">Розмір: <span id="moduleSizeValue">8</span> px</div>
            </div>
        </div>

        <!-- Кнопки -->
        <button class="btn btn-magic" onclick="randomUkrainian()">🎲 Випадковий український стиль</button>
        <button class="btn btn-secondary" onclick="resetSettings()">🔄 Скинути налаштування</button>
    </div>

    <!-- Права панель - QR код -->
    <div class="main-view">
        <div id="qrcode-container">
            <canvas id="qr-canvas"></canvas>
        </div>
        
        <div style="width: 100%; max-width: 340px; margin-top: 24px;">
            <button class="btn btn-download" onclick="downloadQR()">⬇️ Завантажити PNG</button>
            <p class="hint">
                🇺🇦 100% підтримка української мови!<br>
                При скануванні відобразиться ваш текст
            </p>
        </div>
        
        <div class="footer">
            З любов'ю до української культури ❤️
        </div>
    </div>
</div>

<script>
    // ==================== АНАЛІТИКА ====================
    function trackEvent(action, label) {
        if (typeof gtag !== 'undefined') {
            gtag('event', action, {
                'event_category': 'engagement',
                'event_label': label,
                'value': 1
            });
        }
        console.log(`📊 Event: ${action} - ${label}`);
    }

    // ==================== ГЛОБАЛЬНІ ЗМІННІ ====================
    let logoImage = null;
    const canvas = document.getElementById('qr-canvas');
    const ctx = canvas.getContext('2d');

    // ==================== КОНФІГУРАЦІЯ ПРЕСЕТІВ ====================
    const STYLE_PRESETS = {
        traditional: {
            name: "Традиційний",
            dark: '#c41e3a',
            light: '#f5f5f0',
            cross: 'cross'
        },
        modern: {
            name: "Сучасний",
            dark: '#1a1a1a',
            light: '#ffffff',
            cross: 'square'
        },
        ethnic: {
            name: "Етнічний",
            dark: '#8b4513',
            light: '#f5e6d3',
            cross: 'double'
        },
        minimal: {
            name: "Мінімалізм",
            dark: '#000000',
            light: '#ffffff',
            cross: 'cross'
        },
        festive: {
            name: "Святковий",
            dark: '#c41e3a',
            light: '#ffffff',
            cross: 'filled'
        },
        custom: {
            name: "Власний",
            dark: '#c41e3a',
            light: '#f5f5f0',
            cross: 'cross'
        }
    };

    // ==================== ФУНКЦІЯ МАЛЮВАННЯ ХРЕСТИКІВ ====================
    function drawCross(x, y, size, color, type) {
        const s = size * 0.8;
        const half = s / 2;
        const quarter = s / 4;
        
        ctx.save();
        
        switch(type) {
            case 'cross':
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(x - half, y - half);
                ctx.lineTo(x + half, y + half);
                ctx.moveTo(x + half, y - half);
                ctx.lineTo(x - half, y + half);
                ctx.stroke();
                break;
                
            case 'double':
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x - half, y - half);
                ctx.lineTo(x + half, y + half);
                ctx.moveTo(x + half, y - half);
                ctx.lineTo(x - half, y + half);
                ctx.stroke();
                
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x - quarter, y - quarter);
                ctx.lineTo(x + quarter, y + quarter);
                ctx.moveTo(x + quarter, y - quarter);
                ctx.lineTo(x - quarter, y + quarter);
                ctx.stroke();
                break;
                
            case 'filled':
                ctx.fillStyle = color;
                ctx.fillRect(x - half, y - half, s, s);
                ctx.fillStyle = document.getElementById('colorLight').value;
                ctx.fillRect(x - quarter, y - quarter, s/2, s/2);
                break;
                
            case 'square':
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.strokeRect(x - half, y - half, s, s);
                break;
        }
        
        ctx.restore();
    }

    // ==================== ФУНКЦІЯ ГЕНЕРАЦІЇ QR ====================
    async function generateQR() {
        const text = document.getElementById('qrText').value.trim();
        if (!text) {
            alert('Будь ласка, введіть текст');
            return;
        }

        const colorDark = document.getElementById('colorDark').value;
        const colorLight = document.getElementById('colorLight').value;
        const crossType = document.getElementById('crossType').value;
        const moduleSize = parseInt(document.getElementById('moduleSize').value);

        // Оновлюємо значення розміру
        document.getElementById('moduleSizeValue').textContent = moduleSize;

        try {
            // Генеруємо QR код за допомогою сучасної бібліотеки (підтримує Unicode)
            const qrData = await QRCode.toString(text, {
                type: 'array',
                errorCorrectionLevel: 'H',
                margin: 2
            });

            // Встановлюємо розмір canvas
            const matrix = qrData;
            const size = matrix.length;
            canvas.width = size * moduleSize + 40;
            canvas.height = size * moduleSize + 40;

            // Малюємо фон
            ctx.fillStyle = colorLight;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Малюємо QR код з хрестиками
            const offset = 20;
            
            for (let row = 0; row < size; row++) {
                for (let col = 0; col < size; col++) {
                    if (matrix[row][col] === 1) {
                        const x = offset + col * moduleSize + moduleSize / 2;
                        const y = offset + row * moduleSize + moduleSize / 2;
                        
                        drawCross(x, y, moduleSize, colorDark, crossType);
                    }
                }
            }

            // Додаємо логотип, якщо є
            if (logoImage) {
                const logoSize = moduleSize * 4;
                const logoX = (canvas.width - logoSize) / 2;
                const logoY = (canvas.height - logoSize) / 2;
                
                // Білий фон для лого
                ctx.fillStyle = colorLight;
                ctx.fillRect(logoX - 5, logoY - 5, logoSize + 10, logoSize + 10);
                
                // Малюємо лого
                ctx.drawImage(logoImage, logoX, logoY, logoSize, logoSize);
            }

            // Оновлюємо стиль контейнера
            document.getElementById('qrcode-container').style.background = colorLight;
            document.getElementById('qrcode-container').style.borderColor = colorDark;
            
            trackEvent('generate_qr', crossType);
            
        } catch (error) {
            console.error('Помилка генерації QR:', error);
            alert('Помилка: ' + error.message);
        }
    }

    // ==================== ФУНКЦІЇ КЕРУВАННЯ ====================
    function setText(text) {
        document.getElementById('qrText').value = text;
        generateQR();
        trackEvent('test_text', 'ukrainian');
    }

    function setPreset(key) {
        const preset = STYLE_PRESETS[key];
        document.getElementById('stylePreset').value = key;
        document.getElementById('colorDark').value = preset.dark;
        document.getElementById('colorLight').value = preset.light;
        document.getElementById('crossType').value = preset.cross;
        
        // Оновлюємо активний клас
        document.querySelectorAll('.style-dot').forEach(dot => dot.classList.remove('active'));
        const activeDot = document.querySelector(`.style-dot.preset-${key}`);
        if (activeDot) activeDot.classList.add('active');
        
        updateCrossPreview(preset.cross);
        generateQR();
        trackEvent('apply_preset', key);
    }

    function setCrossType(type) {
        document.getElementById('crossType').value = type;
        updateCrossPreview(type);
        generateQR();
    }

    function updateCrossPreview(type) {
        document.querySelectorAll('.cross-preview-item').forEach(item => {
            item.classList.toggle('active', item.dataset.type === type);
        });
    }

    function randomUkrainian() {
        const presets = ['traditional', 'ethnic', 'festive', 'modern'];
        const random = presets[Math.floor(Math.random() * presets.length)];
        setPreset(random);
    }

    function resetSettings() {
        setPreset('traditional');
        document.getElementById('moduleSize').value = 8;
        document.getElementById('moduleSizeValue').textContent = '8';
        clearLogo();
        trackEvent('reset', 'all_settings');
    }

    // ==================== ЛОГОТИП ====================
    document.getElementById('logoFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                logoImage = img;
                document.getElementById('fileName').classList.add('show');
                generateQR();
                trackEvent('upload_logo', 'success');
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function clearLogo() {
        logoImage = null;
        document.getElementById('logoFile').value = '';
        document.getElementById('fileName').classList.remove('show');
        generateQR();
    }

    // ==================== ЗАВАНТАЖЕННЯ ====================
    function downloadQR() {
        if (!canvas.width) {
            alert('Спочатку створіть QR-код');
            return;
        }
        
        const link = document.createElement('a');
        link.download = 'qr-vyshyvanka-' + Date.now() + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        trackEvent('download_qr', 'png');
    }

    // ==================== LIVE-ОНОВЛЕННЯ ====================
    document.getElementById('qrText').addEventListener('input', generateQR);
    document.getElementById('colorDark').addEventListener('input', generateQR);
    document.getElementById('colorLight').addEventListener('input', generateQR);
    document.getElementById('moduleSize').addEventListener('input', generateQR);
    document.getElementById('stylePreset').addEventListener('change', function() {
        setPreset(this.value);
    });
    document.getElementById('crossType').addEventListener('change', function() {
        updateCrossPreview(this.value);
        generateQR();
    });

    // ==================== ІНІЦІАЛІЗАЦІЯ ====================
    window.addEventListener('load', () => {
        document.querySelector('.style-dot.preset-traditional').classList.add('active');
        updateCrossPreview('cross');
        
        setTimeout(() => {
            if (typeof QRCode !== 'undefined') {
                generateQR();
                trackEvent('page_load', 'success');
            } else {
                console.error('QRCode library not loaded');
            }
        }, 300);
    });

    console.log('%c🇺🇦 QR Вишиванка з 100% підтримкою української мови!', 'color: #c41e3a; font-size: 14px; font-weight: bold;');
</script>
</body>
</html>
