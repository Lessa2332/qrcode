<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Designer Pro | Creative Styles</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
    <style>
        :root {
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --bg: #0f172a;
            --panel: #1e293b;
            --panel-hover: #334155;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --border: rgba(255,255,255,0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
        }
        
        .app-container {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 24px;
            max-width: 1100px;
            width: 100%;
            align-items: start;
        }
        
        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
        }
        
        .sidebar {
            background: var(--panel);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        
        .main-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid var(--border);
            min-height: 400px;
        }
        
        h1 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .group { margin-bottom: 18px; }
        
        label {
            display: block;
            font-size: 0.7rem;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        input[type="file"] {
            font-size: 12px;
            color: var(--text-dim);
            width: 100%;
        }
        
        .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        input[type="color"] {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #0f172a;
            padding: 4px;
        }
        
        .file-upload-wrapper {
            border: 2px dashed #334155;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .file-upload-wrapper:hover { border-color: var(--accent); }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-size: 14px;
        }
        
        .btn-magic {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn-magic:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }
        
        .btn-download {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            color: white;
            margin-top: 20px;
            font-size: 15px;
        }
        .btn-download:hover {
            background: linear-gradient(135deg, #059669, #0d9488);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35);
            transform: translateY(-2px);
        }
        
        #qrcode-container {
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 280px;
            min-height: 280px;
            transition: box-shadow 0.3s;
        }
        
        .style-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .style-dot {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .style-dot.active { border-color: var(--accent); transform: scale(1.05); }
        
        .hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
            line-height: 1.4;
        }
        
        .status {
            font-size: 12px;
            color: var(--success);
            margin-top: 8px;
            display: none;
        }
        .status.show { display: block; animation: fadeIn 0.3s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Стилі для прев'ю пресетів */
        .preset-liquid { background: linear-gradient(135deg, #c0c0c0, #808080); }
        .preset-eco { background: linear-gradient(135deg, #4a7c25, #2d5016); }
        .preset-retro { background: linear-gradient(135deg, #ff00ff, #00ffff); }
        .preset-neon { background: linear-gradient(135deg, #00f3ff, #ff00aa); box-shadow: 0 0 15px #00f3ff; }
        .preset-memphis { background: conic-gradient(#ff6b6b, #4ecdc4, #ffe66d, #ff6b6b); }
        .preset-embroidery { background: repeating-linear-gradient(45deg, #8b4513, #8b4513 2px, #a0522d 2px, #a0522d 4px); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h1>✨ QR Designer Pro</h1>
        
        <div class="group">
            <label>🔗 Текст або URL</label>
            <input type="text" id="qrText" value="https://example.com" placeholder="Введіть посилання...">
        </div>

        <div class="group">
            <label>🖼️ Логотип (опціонально)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="logoFile" accept="image/png, image/jpeg">
            </div>
            <p id="fileName" class="status">✅ Лого завантажено</p>
        </div>

        <div class="group">
            <label>🎨 Стиль дизайну</label>
            <select id="stylePreset" onchange="applyPreset()">
                <option value="default">✨ Класичний</option>
                <option value="liquid">🪙 Рідкий метал</option>
                <option value="eco">🌿 Еко-стиль</option>
                <option value="retro">🎮 Ретро 8-біт</option>
                <option value="neon">💡 Неонова вивіска</option>
                <option value="memphis">🔷 Мемфіс-абстракція</option>
                <option value="embroidery">🧵 Вишивка</option>
            </select>
            <div class="style-preview">
                <div class="style-dot preset-liquid" onclick="setPreset('liquid')" title="Рідкий метал"></div>
                <div class="style-dot preset-eco" onclick="setPreset('eco')" title="Еко-стиль"></div>
                <div class="style-dot preset-retro" onclick="setPreset('retro')" title="Ретро"></div>
                <div class="style-dot preset-neon" onclick="setPreset('neon')" title="Неон"></div>
                <div class="style-dot preset-memphis" onclick="setPreset('memphis')" title="Мемфіс"></div>
                <div class="style-dot preset-embroidery" onclick="setPreset('embroidery')" title="Вишивка"></div>
            </div>
        </div>

        <div class="group">
            <label>🎨 Кольори</label>
            <div class="color-row">
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Основний</label>
                    <input type="color" id="colorDark" value="#1e1b4b">
                </div>
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Фон</label>
                    <input type="color" id="colorLight" value="#ffffff">
                </div>
            </div>
        </div>

        <div class="group">
            <label>🔲 Форма пікселів</label>
            <select id="dotType" onchange="generateQR()">
                <option value="square">Квадрати</option>
                <option value="rounded">Закруглені</option>
                <option value="dots">Круглі точки</option>
                <option value="classy">Елегантні</option>
                <option value="extra-rounded">Дуже закруглені</option>
            </select>
        </div>

        <button class="btn btn-magic" onclick="randomCreative()">🎲 Випадковий креатив</button>
        <button class="btn" style="background: var(--panel-hover); color: white; margin-top: 8px;" onclick="resetColors()">🔄 Скинути кольори</button>
    </div>

    <div class="main-view">
        <div id="qrcode-container"></div>
        <div style="width: 100%; max-width: 340px; margin-top: 24px;">
            <button class="btn btn-download" onclick="downloadPNG()">⬇️ Завантажити PNG</button>
            <button class="btn" style="background: var(--panel-hover); color: white; margin-top: 10px;" onclick="downloadSVG()">⬇️ Завантажити SVG</button>
            <p class="hint" style="text-align: center; margin-top: 12px;">
                💡 Порада: SVG — векторний формат, ідеальний для друку будь-якого розміру
            </p>
        </div>
    </div>
</div>

<script>
    // ==================== КОНФІГУРАЦІЯ СТИЛІВ ====================
    const STYLE_PRESETS = {
        default: {
            name: "Класичний",
            dotsOptions: { type: 'square', color: '#1e1b4b' },
            cornersSquareOptions: { type: 'square', color: '#1e1b4b' },
            cornersDotOptions: { type: 'square', color: '#1e1b4b' },
            backgroundOptions: { color: '#ffffff' },
            imageOptions: { backgroundColor: '#ffffff', margin: 0 }
        },
        liquid: {
            name: "Рідкий метал",
            dotsOptions: { 
                type: 'classy', 
                gradient: { type: 'linear', colorStops: [{ offset: 0, color: '#e0e0e0' }, { offset: 1, color: '#808080' }] }
            },
            cornersSquareOptions: { 
                type: 'extra-rounded',
                gradient: { type: 'linear', colorStops: [{ offset: 0, color: '#c0c0c0' }, { offset: 1, color: '#606060' }] }
            },
            cornersDotOptions: { type: 'square', color: '#a0a0a0' },
            backgroundOptions: { color: '#ffffff' },
            imageOptions: { backgroundColor: '#f5f5f5', margin: 0 },
            cssGlow: '0 0 25px rgba(192, 192, 192, 0.5)'
        },
        eco: {
            name: "Еко-стиль",
            dotsOptions: { 
                type: 'dots', 
                gradient: { type: 'radial', colorStops: [{ offset: 0, color: '#4a7c25' }, { offset: 1, color: '#2d5016' }] }
            },
            cornersSquareOptions: { type: 'rounded', color: '#4a7c25' },
            cornersDotOptions: { type: 'rounded', color: '#2d5016' },
            backgroundOptions: { color: '#f8f4e9' },
            imageOptions: { backgroundColor: '#f8f4e9', margin: 0 }
        },
        retro: {
            name: "Ретро 8-біт",
            dotsOptions: { 
                type: 'square',
                gradient: { type: 'linear', rotation: 45, colorStops: [{ offset: 0, color: '#ff00ff' }, { offset: 1, color: '#00ffff' }] }
            },
            cornersSquareOptions: { type: 'square', color: '#ff00ff' },
            cornersDotOptions: { type: 'square', color: '#00ffff' },
            backgroundOptions: { color: '#0a0a1a' },
            imageOptions: { backgroundColor: '#000000', margin: 0 },
            cssGlow: '0 0 15px #ff00ff, 0 0 30px #00ffff'
        },
        neon: {
            name: "Неонова вивіска",
            dotsOptions: { 
                type: 'rounded',
                gradient: { type: 'linear', colorStops: [{ offset: 0, color: '#00f3ff' }, { offset: 0.5, color: '#7b2fff' }, { offset: 1, color: '#ff00aa' }] }
            },
            cornersSquareOptions: { type: 'extra-rounded', color: '#ff00aa' },
            cornersDotOptions: { type: 'extra-rounded', color: '#00f3ff' },
            backgroundOptions: { color: '#050510' },
            imageOptions: { backgroundColor: '#050510', margin: 0 },
            cssGlow: '0 0 20px #00f3ff, 0 0 40px #ff00aa, 0 0 60px rgba(255,0,170,0.3)'
        },
        memphis: {
            name: "Мемфіс-абстракція",
            dotsOptions: { 
                type: 'extra-rounded',
                gradient: { type: 'radial', colorStops: [{ offset: 0, color: '#ff6b6b' }, { offset: 0.5, color: '#4ecdc4' }, { offset: 1, color: '#ffe66d' }] }
            },
            cornersSquareOptions: { type: 'rounded', color: '#4ecdc4' },
            cornersDotOptions: { type: 'rounded', color: '#ffe66d' },
            backgroundOptions: { color: '#f7fff7' },
            imageOptions: { backgroundColor: '#f7fff7', margin: 0 }
        },
        embroidery: {
            name: "Вишивка",
            dotsOptions: { 
                type: 'classy',
                color: '#8b4513'
            },
            cornersSquareOptions: { type: 'square', color: '#654321' },
            cornersDotOptions: { type: 'square', color: '#a0522d' },
            backgroundOptions: { color: '#f5e6d3' },
            imageOptions: { backgroundColor: '#f5e6d3', margin: 0 }
        }
    };

    // ==================== ІНІЦІАЛІЗАЦІЯ ====================
    let qrCode;
    let currentLogo = null;
    const container = document.getElementById('qrcode-container');

    // ==================== ОСНОВНА ФУНКЦІЯ ГЕНЕРАЦІЇ ====================
    function generateQR() {
        const text = document.getElementById('qrText').value.trim() || 'https://example.com';
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey] || STYLE_PRESETS.default;
        const customColorDark = document.getElementById('colorDark').value;
        const customColorLight = document.getElementById('colorLight').value;
        const dotType = document.getElementById('dotType').value;

        // Глибоке копіювання конфігурації
        const config = JSON.parse(JSON.stringify(preset));
        
        // Застосовуємо кастомні кольори, якщо це не градієнтний пресет
        if (!config.dotsOptions.gradient) {
            config.dotsOptions.color = customColorDark;
            config.cornersSquareOptions.color = customColorDark;
            config.cornersDotOptions.color = customColorDark;
        }
        config.backgroundOptions.color = customColorLight;
        config.imageOptions.backgroundColor = customColorLight;
        
        // Застосовуємо вибраний тип пікселів (якщо не переписано пресетом)
        if (!preset.dotsOptions.type || presetKey === 'default') {
            config.dotsOptions.type = dotType;
            config.cornersSquareOptions.type = dotType === 'dots' ? 'circle' : dotType;
        }

        // Формуємо фінальну конфігурацію для qr-code-styling
        const qrConfig = {
            width: 400,
            height: 400,
            type: 'canvas',
            data: text,
            margin: 10,
            qrOptions: { 
                typeNumber: 0, 
                mode: 'Byte', 
                errorCorrectionLevel: 'H' 
            },
            imageOptions: {
                ...config.imageOptions,
                hideBackgroundDots: true,
                imageSize: 0.3,
                crossOrigin: 'anonymous'
            },
            dotsOptions: config.dotsOptions,
            cornersSquareOptions: config.cornersSquareOptions,
            cornersDotOptions: config.cornersDotOptions,
            backgroundOptions: config.backgroundOptions
        };

        // Додаємо лого, якщо завантажено
        if (currentLogo) {
            qrConfig.image = currentLogo;
        }

        // Оновлюємо або створюємо новий екземпляр
        if (qrCode) {
            qrCode.update(qrConfig);
        } else {
            qrCode = new QRCodeStyling(qrConfig);
            qrCode.append(container);
        }

        // Застосовуємо CSS-ефекти (світіння тощо)
        container.style.boxShadow = config.cssGlow || '0 20px 60px rgba(0,0,0,0.4)';
        container.style.background = config.backgroundOptions.color;
    }

    // ==================== ФУНКЦІЇ УПРАВЛІННЯ ====================
    function applyPreset() {
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey];
        
        // Оновлюємо кольори в інпутах для зручності
        if (preset.dotsOptions.color && !preset.dotsOptions.gradient) {
            document.getElementById('colorDark').value = preset.dotsOptions.color;
        }
        document.getElementById('colorLight').value = preset.backgroundOptions.color;
        if (preset.dotsOptions.type) {
            document.getElementById('dotType').value = preset.dotsOptions.type;
        }
        
        // Підсвічуємо активний пресет у прев'ю
        document.querySelectorAll('.style-dot').forEach(dot => dot.classList.remove('active'));
        const activeDot = document.querySelector(`.style-dot.preset-${presetKey}`);
        if (activeDot) activeDot.classList.add('active');
        
        generateQR();
    }

    function setPreset(key) {
        document.getElementById('stylePreset').value = key;
        applyPreset();
    }

    function randomCreative() {
        const creative = ['liquid', 'eco', 'retro', 'neon', 'memphis', 'embroidery'];
        const random = creative[Math.floor(Math.random() * creative.length)];
        setPreset(random);
    }

    function resetColors() {
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey];
        document.getElementById('colorDark').value = preset.dotsOptions.color || '#1e1b4b';
        document.getElementById('colorLight').value = preset.backgroundOptions.color || '#ffffff';
        generateQR();
    }

    // ==================== ЗАВАНТАЖЕННЯ ФАЙЛІВ ====================
    function downloadPNG() {
        if (!qrCode) return;
        qrCode.download({ 
            extension: 'png', 
            name: 'qr-design-' + Date.now() 
        });
    }

    function downloadSVG() {
        if (!qrCode) return;
        qrCode.download({ 
            extension: 'svg', 
            name: 'qr-design-' + Date.now() 
        });
    }

    // ==================== ОБРОБКА ЛОГОТИПУ ====================
    document.getElementById('logoFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            currentLogo = event.target.result;
            document.getElementById('fileName').classList.add('show');
            generateQR();
        };
        reader.readAsDataURL(file);
    });

    // ==================== LIVE-ОНОВЛЕННЯ ПРИ ВВОДІ ====================
    document.getElementById('qrText').addEventListener('input', generateQR);
    document.getElementById('colorDark').addEventListener('input', generateQR);
    document.getElementById('colorLight').addEventListener('input', generateQR);
    document.getElementById('dotType').addEventListener('change', generateQR);

    // ==================== ІНІЦІАЛІЗАЦІЯ ПРИ ЗАВАНТАЖЕННІ ====================
    window.addEventListener('load', () => {
        // Встановлюємо активний прев'ю для дефолтного пресету
        document.querySelector('.style-dot').classList.add('active');
        generateQR();
    });

    // ==================== ДРУЖНІ ПОВІДОМЛЕННЯ В КОНСОЛІ ====================
    console.log('%c✨ QR Designer Pro готовий!', 'color: #6366f1; font-size: 14px; font-weight: bold;');
    console.log('%c💡 Порада: використовуйте SVG для друку великих форматів', 'color: #94a3b8; font-size: 11px;');
</script>

</body>
</html>
