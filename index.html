<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇺🇦 QR Вишиванка | Український QR Designer</title>
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YELMN6CN7Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YELMN6CN7Q');
    </script>
    
    <!-- Проста і надійна бібліотека qrcode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #c41e3a, #f5f5f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        
        .card {
            background: rgba(22, 33, 62, 0.7);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(196, 30, 58, 0.3);
        }
        
        textarea, select, input[type="text"] {
            width: 100%;
            padding: 15px;
            margin: 10px 0 15px 0;
            border-radius: 15px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        textarea:focus, select:focus {
            outline: none;
            border-color: #c41e3a;
            box-shadow: 0 0 0 3px rgba(196, 30, 58, 0.2);
        }
        
        .color-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
        }
        
        .color-row div {
            text-align: center;
        }
        
        .color-row label {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input[type="color"] {
            width: 100%;
            height: 50px;
            border: 2px solid #334155;
            border-radius: 12px;
            cursor: pointer;
            background: #0f172a;
            padding: 5px;
        }
        
        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 20px;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        
        button {
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            background: #c41e3a;
            color: white;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(196, 30, 58, 0.4);
        }
        
        button.secondary {
            background: #1f3460;
        }
        
        button.secondary:hover {
            background: #2a3f7a;
            box-shadow: 0 10px 25px rgba(31, 52, 96, 0.4);
        }
        
        #qrcode-container {
            background: #f5f5f0;
            padding: 30px;
            border-radius: 25px;
            margin: 25px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #c41e3a;
        }
        
        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #qrcode canvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
        
        .download-btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
        }
        
        .download-btn:hover {
            background: linear-gradient(135deg, #059669, #047857);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }
        
        .hint {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 15px;
        }
        
        .test-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .test-btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            background: #334155;
        }
        
        .test-btn:hover {
            background: #475569;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #62748c;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇺🇦 QR Вишиванка</h1>
        <p class="subtitle">Український QR-код у стилі вишивки хрестиком</p>
        
        <div class="card">
            <!-- Тестові кнопки -->
            <div class="test-buttons">
                <button class="test-btn" onclick="setUkrainianText()">🇺🇦 Слава Україні!</button>
                <button class="test-btn" onclick="setEnglishText()">🇬🇧 Hello World</button>
                <button class="test-btn" onclick="setUrlText()">🔗 Приклад URL</button>
            </div>
            
            <!-- Поле для тексту -->
            <textarea id="qrText" placeholder="Введіть текст українською або посилання...">Слава Україні! 🇺🇦</textarea>
            
            <!-- Вибір кольорів -->
            <div class="color-row">
                <div>
                    <label>🎨 Колір ниток</label>
                    <input type="color" id="colorDark" value="#c41e3a">
                </div>
                <div>
                    <label>🧵 Колір полотна</label>
                    <input type="color" id="colorLight" value="#f5f5f0">
                </div>
            </div>
            
            <!-- Вибір стилю -->
            <select id="crossType">
                <option value="cross">✚ Простий хрестик (традиційний)</option>
                <option value="double">✜ Подвійний хрестик</option>
                <option value="filled">⬛ Заповнений хрестик</option>
                <option value="square">◻️ Квадратний стібок</option>
            </select>
            
            <!-- Кнопки керування -->
            <div class="button-group">
                <button onclick="generateQR()">🔄 Створити QR</button>
                <button class="secondary" onclick="randomStyle()">🎲 Випадковий стиль</button>
            </div>
            
            <!-- Контейнер для QR-коду -->
            <div id="qrcode-container">
                <div id="qrcode"></div>
            </div>
            
            <!-- Кнопка завантаження -->
            <button class="download-btn" onclick="downloadQR()">⬇️ Завантажити PNG</button>
            
            <p class="hint">
                ✅ Підтримує українську мову • Працює на всіх пристроях<br>
                При скануванні відобразиться ваш текст
            </p>
        </div>
        
        <div class="footer">
            🇺🇦 З любов'ю до української культури
        </div>
    </div>

    <script>
        // ==================== АНАЛІТИКА ====================
        function trackEvent(action, label) {
            if (typeof gtag !== 'undefined') {
                gtag('event', action, {
                    'event_category': 'engagement',
                    'event_label': label,
                    'value': 1
                });
            }
            console.log(`📊 Event: ${action} - ${label}`);
        }

        // ==================== ГЛОБАЛЬНІ ЗМІННІ ====================
        let qrCodeInstance = null;

        // ==================== ФУНКЦІЯ ГЕНЕРАЦІЇ QR-КОДУ ====================
        function generateQR() {
            const text = document.getElementById('qrText').value.trim();
            if (!text) {
                alert('Будь ласка, введіть текст');
                return;
            }

            const colorDark = document.getElementById('colorDark').value;
            const colorLight = document.getElementById('colorLight').value;
            const crossType = document.getElementById('crossType').value;

            // Очищуємо контейнер
            document.getElementById('qrcode').innerHTML = '';

            // Створюємо новий QR-код
            qrCodeInstance = new QRCode(document.getElementById('qrcode'), {
                text: text,
                width: 300,
                height: 300,
                colorDark: colorDark,
                colorLight: colorLight,
                correctLevel: QRCode.CorrectLevel.H
            });

            // Додаємо хрестики через невелику затримку
            setTimeout(() => {
                const canvas = document.querySelector('#qrcode canvas');
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    ctx.lineWidth = 3;
                    
                    for (let x = 0; x < canvas.width; x += 20) {
                        for (let y = 0; y < canvas.height; y += 20) {
                            try {
                                // Перевіряємо, чи це темний піксель
                                const pixel = ctx.getImageData(x + 10, y + 10, 1, 1).data;
                                
                                // Якщо піксель темний (не білий)
                                if (pixel[0] < 128 && pixel[1] < 128 && pixel[2] < 128) {
                                    
                                    switch(crossType) {
                                        case 'cross': // Простий хрестик
                                            ctx.strokeStyle = colorDark;
                                            ctx.beginPath();
                                            ctx.moveTo(x + 5, y + 5);
                                            ctx.lineTo(x + 15, y + 15);
                                            ctx.moveTo(x + 15, y + 5);
                                            ctx.lineTo(x + 5, y + 15);
                                            ctx.stroke();
                                            break;
                                            
                                        case 'double': // Подвійний хрестик
                                            ctx.strokeStyle = colorDark;
                                            ctx.lineWidth = 2;
                                            ctx.beginPath();
                                            ctx.moveTo(x + 3, y + 3);
                                            ctx.lineTo(x + 17, y + 17);
                                            ctx.moveTo(x + 17, y + 3);
                                            ctx.lineTo(x + 3, y + 17);
                                            ctx.stroke();
                                            
                                            ctx.beginPath();
                                            ctx.moveTo(x + 8, y + 8);
                                            ctx.lineTo(x + 12, y + 12);
                                            ctx.moveTo(x + 12, y + 8);
                                            ctx.lineTo(x + 8, y + 12);
                                            ctx.stroke();
                                            break;
                                            
                                        case 'filled': // Заповнений хрестик
                                            ctx.fillStyle = colorDark;
                                            ctx.fillRect(x + 5, y + 5, 10, 10);
                                            ctx.fillStyle = colorLight;
                                            ctx.fillRect(x + 8, y + 8, 4, 4);
                                            break;
                                            
                                        case 'square': // Квадратний стібок
                                            ctx.strokeStyle = colorDark;
                                            ctx.lineWidth = 2;
                                            ctx.strokeRect(x + 5, y + 5, 10, 10);
                                            break;
                                    }
                                }
                            } catch (e) {
                                // Ігноруємо помилки
                            }
                        }
                    }
                }
                
                // Оновлюємо стиль контейнера
                document.getElementById('qrcode-container').style.background = colorLight;
                document.getElementById('qrcode-container').style.borderColor = colorDark;
                
                trackEvent('generate_qr', crossType);
            }, 150);
        }

        // ==================== ТЕСТОВІ ФУНКЦІЇ ====================
        function setUkrainianText() {
            document.getElementById('qrText').value = 'Слава Україні! Героям слава! 🇺🇦';
            generateQR();
            trackEvent('test_text', 'ukrainian');
        }

        function setEnglishText() {
            document.getElementById('qrText').value = 'Hello World! Glory to Ukraine!';
            generateQR();
            trackEvent('test_text', 'english');
        }

        function setUrlText() {
            document.getElementById('qrText').value = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
            generateQR();
            trackEvent('test_text', 'url');
        }

        // ==================== ВИПАДКОВИЙ СТИЛЬ ====================
        function randomStyle() {
            const colors = [
                { dark: '#c41e3a', light: '#f5f5f0' }, // традиційний
                { dark: '#1a1a1a', light: '#ffffff' }, // чорний
                { dark: '#8b4513', light: '#f5e6d3' }, // коричневий
                { dark: '#2e5c4b', light: '#e8f0e8' }, // зелений
                { dark: '#9b2c2c', light: '#faf0e6' }, // бордовий
                { dark: '#4a5568', light: '#f7fafc' }  // сірий
            ];
            
            const types = ['cross', 'double', 'filled', 'square'];
            
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const randomType = types[Math.floor(Math.random() * types.length)];
            
            document.getElementById('colorDark').value = randomColor.dark;
            document.getElementById('colorLight').value = randomColor.light;
            document.getElementById('crossType').value = randomType;
            
            generateQR();
            trackEvent('random_style', randomType);
        }

        // ==================== ЗАВАНТАЖЕННЯ ====================
        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                alert('Спочатку створіть QR-код');
                return;
            }
            
            const link = document.createElement('a');
            link.download = 'qr-vyshyvanka-' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            trackEvent('download_qr', 'png');
        }

        // ==================== СКИДАННЯ ====================
        function resetToTraditional() {
            document.getElementById('colorDark').value = '#c41e3a';
            document.getElementById('colorLight').value = '#f5f5f0';
            document.getElementById('crossType').value = 'cross';
            generateQR();
            trackEvent('reset', 'traditional');
        }

        // ==================== ІНІЦІАЛІЗАЦІЯ ====================
        window.addEventListener('load', () => {
            setTimeout(() => {
                generateQR();
                trackEvent('page_load', 'success');
            }, 200);
            
            // Додаємо клавішу Enter для генерації
            document.getElementById('qrText').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    generateQR();
                }
            });
        });

        // Логування для перевірки
        console.log('🇺🇦 QR Вишиванка завантажено!', new Date().toLocaleString());
        console.log('📊 Google Analytics ID: G-YELMN6CN7Q');
    </script>
</body>
</html>
