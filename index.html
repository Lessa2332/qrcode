<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇺🇦 QR Вишиванка | Український QR Designer</title>
   
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YELMN6CN7Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YELMN6CN7Q');
    </script>
   
    <!-- QR Code Library -->
    <script src="https://davidshimjs.github.io/qrcodejs/qrcode.min.js"></script>
   
    <style>
        :root {
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --bg: #1a1a2e;
            --panel: #16213e;
            --panel-hover: #1f3460;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --border: rgba(255,255,255,0.1);
            --vyshyvanka-red: #c41e3a;
            --vyshyvanka-white: #f5f5f0;
        }
       
        * { box-sizing: border-box; margin: 0; padding: 0; }
       
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
        }
       
        .app-container {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
            max-width: 1000px;
            width: 100%;
            align-items: start;
        }
       
        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
        }
       
        .sidebar {
            background: var(--panel);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            height: fit-content;
            position: sticky;
            top: 20px;
            border: 1px solid rgba(196, 30, 58, 0.2);
        }
       
        .main-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid var(--border);
            min-height: 400px;
        }
       
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #c41e3a, #f5f5f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
       
        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 20px;
        }
       
        .group { margin-bottom: 18px; }
       
        label {
            display: block;
            font-size: 0.7rem;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
       
        input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: border-color 0.2s;
        }
       
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
       
        input[type="file"] {
            font-size: 12px;
            color: var(--text-dim);
            width: 100%;
        }
       
        .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
       
        input[type="color"] {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #0f172a;
            padding: 4px;
        }
       
        .file-upload-wrapper {
            border: 2px dashed #334155;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .file-upload-wrapper:hover { border-color: var(--accent); }
       
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-size: 14px;
        }
       
        .btn-magic {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            color: white;
        }
        .btn-magic:hover {
            background: linear-gradient(135deg, #b91c1c, #7b0000);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196, 30, 58, 0.4);
        }
       
        .btn-download {
            background: linear-gradient(135deg, #10b981, #14b8a6);
            color: white;
            margin-top: 20px;
            font-size: 15px;
        }
        .btn-download:hover {
            background: linear-gradient(135deg, #059669, #0d9488);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35);
            transform: translateY(-2px);
        }
       
        #qrcode-container {
            background: var(--vyshyvanka-white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 320px;
            min-height: 320px;
            transition: all 0.3s;
            border: 3px solid var(--vyshyvanka-red);
        }
       
        .hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
            line-height: 1.4;
        }
       
        .status {
            font-size: 12px;
            color: var(--success);
            margin-top: 8px;
            display: none;
        }
        .status.show { display: block; animation: fadeIn 0.3s; }
       
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .ornament-border {
            position: relative;
        }
        .ornament-border::before {
            content: '🇺🇦';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
        }
        .range-slider {
            width: 100%;
            margin-top: 8px;
        }
        .range-slider input {
            width: 100%;
            accent-color: var(--accent);
        }
        .range-value {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar ornament-border">
        <h1>🇺🇦 QR Вишиванка</h1>
        <p class="subtitle">Український QR-код у стилі вишивки хрестиком</p>
       
        <div class="group">
            <label>🔗 Текст або URL</label>
            <input type="text" id="qrText" value="https://example.com" placeholder="Введіть посилання...">
        </div>
        <div class="group">
            <label>🖼️ Логотип / Герб (опціонально)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="logoFile" accept="image/png, image/jpeg, image/svg+xml">
            </div>
            <p id="fileName" class="status">✅ Лого завантажено</p>
        </div>
        <div class="group">
            <label>🎨 Стиль вишивки</label>
            <select id="stylePreset" onchange="applyPreset()">
                <option value="traditional">🌹 Традиційний (Червоний)</option>
                <option value="modern">⚫ Сучасний (Чорний)</option>
                <option value="ethnic">🌾 Етнічний (Бежевий)</option>
                <option value="minimal">◻️ Мінімалізм</option>
                <option value="festive">🎉 Святковий градієнт</option>
                <option value="custom">✏️ Власні кольори</option>
            </select>
        </div>
        <div class="group">
            <label>🧵 Тип стібка</label>
            <select id="crossType" onchange="generateQR()">
                <option value="cross">✚ Хрестик (класика)</option>
                <option value="double">✜ Подвійний хрест</option>
                <option value="filled">✙ Заповнений</option>
                <option value="square">◈ Квадрат (вишивка)</option>
            </select>
            <p class="hint">💡 Хрестики найкраще видно при розмірі 85%+</p>
        </div>
        <div class="group">
            <label>🎨 Кольори</label>
            <div class="color-row">
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Нитки</label>
                    <input type="color" id="colorDark" value="#c41e3a">
                </div>
                <div>
                    <label style="font-size: 10px; margin-bottom: 4px;">Полотно</label>
                    <input type="color" id="colorLight" value="#f5f5f0">
                </div>
            </div>
        </div>

        <!-- ========== НОВИЙ БЛОК МАСКИ ========== -->
        <div class="group">
            <label>🎭 Маска (центральний елемент)</label>
            <select id="maskType" onchange="generateQR()">
                <option value="none">Без маски</option>
                <option value="circle">Коло</option>
                <option value="square">Квадрат</option>
                <option value="heart">Серце</option>
                <option value="rhombus">Ромб</option>
                <option value="tryzub">🇺🇦 Тризуб</option>
            </select>
            <div class="range-slider" style="margin-top: 10px;">
                <input type="range" id="maskSize" min="2" max="8" step="1" value="4" oninput="updateMaskSize()">
                <div class="range-value">Розмір маски: <span id="maskSizeValue">4</span> модулі</div>
            </div>
            <div class="range-slider" style="margin-top: 10px;">
                <input type="range" id="maskOpacity" min="0" max="1" step="0.05" value="0.7" oninput="updateMaskOpacity()">
                <div class="range-value">Прозорість: <span id="maskOpacityValue">70</span>%</div>
            </div>
        </div>

        <div class="group">
            <label>📐 Розмір елементів</label>
            <div class="range-slider">
                <input type="range" id="dotSize" min="0.6" max="1.0" step="0.05" value="0.9" oninput="generateQR()">
                <div class="range-value">Розмір: <span id="dotSizeValue">90</span>%</div>
            </div>
            <div class="range-slider" style="margin-top: 10px;">
                <input type="range" id="logoSize" min="0.1" max="0.4" step="0.05" value="0.25" oninput="generateQR()">
                <div class="range-value">Логотип: <span id="logoSizeValue">25</span>%</div>
            </div>
        </div>
        <button class="btn btn-magic" onclick="randomUkrainian()">🎲 Випадковий стиль</button>
        <button class="btn" style="background: var(--panel-hover); color: white; margin-top: 8px;" onclick="resetColors()">🔄 Скинути</button>
    </div>
    <div class="main-view">
        <div id="qrcode-container"></div>
        <div style="width: 100%; max-width: 340px; margin-top: 24px;">
            <button class="btn btn-download" onclick="downloadPNG()">⬇️ Завантажити PNG</button>
            <button class="btn" style="background: var(--panel-hover); color: white; margin-top: 10px;" onclick="downloadSVG()">⬇️ Завантажити SVG</button>
            <p class="hint" style="text-align: center; margin-top: 12px;">
                🇺🇦 SVG — для друку, PNG — для веб
            </p>
        </div>
    </div>
</div>
<script>
    // ==================== КОНФІГУРАЦІЯ СТИЛІВ ====================
    const STYLE_PRESETS = {
        traditional: {
            name: "Традиційний",
            color: '#c41e3a',
            bg: '#f5f5f0',
            crossType: 'cross'
        },
        modern: {
            name: "Сучасний",
            color: '#1a1a1a',
            bg: '#ffffff',
            crossType: 'square'
        },
        ethnic: {
            name: "Етнічний",
            color: '#8b4513',
            bg: '#f5e6d3',
            crossType: 'double'
        },
        minimal: {
            name: "Мінімалізм",
            color: '#000000',
            bg: '#ffffff',
            crossType: 'cross'
        },
        festive: {
            name: "Святковий",
            color: '#c41e3a',
            bg: '#ffffff',
            crossType: 'filled'
        },
        custom: {
            name: "Власний",
            color: '#c41e3a',
            bg: '#f5f5f0',
            crossType: 'cross'
        }
    };
    // ==================== ІНІЦІАЛІЗАЦІЯ ====================
    let currentLogo = null;
    let currentSVG = null;
    const container = document.getElementById('qrcode-container');
    // ==================== ФУНКЦІЯ ДЛЯ ЕЛЕМЕНТІВ ХРЕСТИКА ====================
    function getCrossElements(type, color, dotSize) {
        const elements = [];
        const inset = (1 - dotSize) / 2;
        const strokeWidth = dotSize * 0.16;

        const safeColor = color.replace('#', '');

        // Базовий хрестик
        const line1 = `<line x1="${inset}" y1="${inset}" x2="${1 - inset}" y2="${1 - inset}" stroke="#${safeColor}" stroke-width="${strokeWidth}" stroke-linecap="round"/>`;
        const line2 = `<line x1="${1 - inset}" y1="${inset}" x2="${inset}" y2="${1 - inset}" stroke="#${safeColor}" stroke-width="${strokeWidth}" stroke-linecap="round"/>`;

        elements.push(line1, line2);

        if (type === 'double') {
            const innerInset = inset + 0.1;
            elements.push(
                `<line x1="${innerInset}" y1="${innerInset}" x2="${1 - innerInset}" y2="${1 - innerInset}" stroke="#${safeColor}" stroke-width="${strokeWidth * 0.8}" stroke-linecap="round"/>`,
                `<line x1="${1 - innerInset}" y1="${innerInset}" x2="${innerInset}" y2="${1 - innerInset}" stroke="#${safeColor}" stroke-width="${strokeWidth * 0.8}" stroke-linecap="round"/>`
            );
        } else if (type === 'filled') {
            elements.push(`<circle cx="0.5" cy="0.5" r="${dotSize * 0.2}" fill="#${safeColor}"/>`);
        } else if (type === 'square') {
            elements.push(`<rect x="${inset}" y="${inset}" width="${dotSize}" height="${dotSize}" fill="none" stroke="#${safeColor}" stroke-width="${strokeWidth}" stroke-linejoin="round"/>`);
        }

        return elements.join('');
    }

    // ==================== НОВА ФУНКЦІЯ МАЛЮВАННЯ МАСКИ ====================
    function drawMask(svg, moduleCount, maskType, maskSizeModules, maskOpacity, colorDark, colorLight) {
        if (maskType === 'none') return;

        const size = maskSizeModules; // розмір в модулях
        const center = moduleCount / 2;
        const half = size / 2;

        // Створюємо групу для маски
        const maskGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
        maskGroup.setAttribute("transform", `translate(${center}, ${center})`);

        // Встановлюємо колір заливки (колір полотна) та обведення (колір ниток) з прозорістю
        const fillColor = colorLight;
        const strokeColor = colorDark;

        let shape;
        switch (maskType) {
            case 'circle':
                shape = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                shape.setAttribute("r", half);
                break;
            case 'square':
                shape = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                shape.setAttribute("x", -half);
                shape.setAttribute("y", -half);
                shape.setAttribute("width", size);
                shape.setAttribute("height", size);
                break;
            case 'heart':
                shape = document.createElementNS("http://www.w3.org/2000/svg", "path");
                // Спрощений шлях серця
                shape.setAttribute("d", `M 0,${-half*0.5} C ${-half},${-half*0.8} ${-half},${half*0.3} 0,${half*0.7} C ${half},${half*0.3} ${half},${-half*0.8} 0,${-half*0.5} Z`);
                break;
            case 'rhombus':
                shape = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                shape.setAttribute("points", `0,${-half} ${half},0 0,${half} ${-half},0`);
                break;
            case 'tryzub':
                shape = document.createElementNS("http://www.w3.org/2000/svg", "path");
                // Спрощений шлях тризуба (малий герб України)
                shape.setAttribute("d", `M 0,${-half*0.8} L ${half*0.4},${-half*0.2} L ${half*0.2},${half*0.3} L 0,${half*0.1} L ${-half*0.2},${half*0.3} L ${-half*0.4},${-half*0.2} Z`);
                break;
            default:
                return;
        }

        shape.setAttribute("fill", fillColor);
        shape.setAttribute("stroke", strokeColor);
        shape.setAttribute("stroke-width", "0.3");
        shape.setAttribute("fill-opacity", maskOpacity);
        shape.setAttribute("stroke-opacity", "1");

        maskGroup.appendChild(shape);
        svg.appendChild(maskGroup);
    }

    // ==================== ОСНОВНА ФУНКЦІЯ ГЕНЕРАЦІЇ ====================
    function generateQR() {
        const text = document.getElementById('qrText').value.trim() || 'https://example.com';
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey] || STYLE_PRESETS.traditional;
        const customColor = document.getElementById('colorDark').value;
        const customBg = document.getElementById('colorLight').value;
        const crossType = document.getElementById('crossType').value;
        const dotSize = parseFloat(document.getElementById('dotSize').value);
        const logoSize = parseFloat(document.getElementById('logoSize').value);
        document.getElementById('dotSizeValue').textContent = Math.round(dotSize * 100);
        document.getElementById('logoSizeValue').textContent = Math.round(logoSize * 100);

        const finalColor = presetKey !== 'custom' ? preset.color : customColor;
        const finalBg = presetKey !== 'custom' ? preset.bg : customBg;
        const finalCrossType = presetKey !== 'custom' ? preset.crossType : crossType;

        // Генерація матриці QR
        const tempDiv = document.createElement('div');
        const qrcode = new QRCode(tempDiv, {
            text: text,
            correctLevel: QRCode.CorrectLevel.H  // Висока корекція для сканування
        });
        const modules = qrcode.modules;
        const moduleCount = qrcode.moduleCount;

        // Створення SVG (viewBox в одиницях модулів)
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("viewBox", `0 0 ${moduleCount} ${moduleCount}`);
        svg.setAttribute("width", "100%");  // Масштабування для дисплея
        svg.setAttribute("height", "100%");

        // Фон (полотно)
        const bgRect = document.createElementNS(svgNS, "rect");
        bgRect.setAttribute("width", moduleCount);
        bgRect.setAttribute("height", moduleCount);
        bgRect.setAttribute("fill", finalBg);
        svg.appendChild(bgRect);

        // Опціонально: сітка для ефекту полотна
        for (let i = 0; i <= moduleCount; i++) {
            const hLine = document.createElementNS(svgNS, "line");
            hLine.setAttribute("x1", 0); hLine.setAttribute("y1", i);
            hLine.setAttribute("x2", moduleCount); hLine.setAttribute("y2", i);
            hLine.setAttribute("stroke", "rgba(0,0,0,0.05)"); hLine.setAttribute("stroke-width", 0.02);
            svg.appendChild(hLine);

            const vLine = document.createElementNS(svgNS, "line");
            vLine.setAttribute("x1", i); vLine.setAttribute("y1", 0);
            vLine.setAttribute("x2", i); vLine.setAttribute("y2", moduleCount);
            vLine.setAttribute("stroke", "rgba(0,0,0,0.05)"); vLine.setAttribute("stroke-width", 0.02);
            svg.appendChild(vLine);
        }

        // Малювання хрестиків для темних модулів
        for (let row = 0; row < moduleCount; row++) {
            for (let col = 0; col < moduleCount; col++) {
                if (modules[row][col]) {
                    const g = document.createElementNS(svgNS, "g");
                    g.setAttribute("transform", `translate(${col}, ${row})`);
                    g.innerHTML = getCrossElements(finalCrossType, finalColor, dotSize);
                    svg.appendChild(g);
                }
            }
        }

        // ===== ДОДАЄМО МАСКУ (перед логотипом, щоб лого був поверх) =====
        const maskType = document.getElementById('maskType').value;
        const maskSize = parseInt(document.getElementById('maskSize').value);
        const maskOpacity = parseFloat(document.getElementById('maskOpacity').value);
        drawMask(svg, moduleCount, maskType, maskSize, maskOpacity, finalColor, finalBg);

        // Додавання логотипу (накладання поверх)
        if (currentLogo) {
            const logoElem = document.createElementNS(svgNS, "image");
            logoElem.setAttributeNS("http://www.w3.org/1999/xlink", "href", currentLogo);
            const logoSizeUnits = moduleCount * logoSize;
            logoElem.setAttribute("width", logoSizeUnits);
            logoElem.setAttribute("height", logoSizeUnits);
            logoElem.setAttribute("x", (moduleCount - logoSizeUnits) / 2);
            logoElem.setAttribute("y", (moduleCount - logoSizeUnits) / 2);
            svg.appendChild(logoElem);
        }

        // Відображення в контейнері
        container.innerHTML = '';
        container.appendChild(svg);
        container.style.background = finalBg;
        container.style.borderColor = finalColor;

        // Зберігаємо SVG для завантаження
        currentSVG = svg;
    }
    // ==================== ФУНКЦІЇ УПРАВЛІННЯ ====================
    function applyPreset() {
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey];
       
        if (preset.color && presetKey !== 'custom') {
            document.getElementById('colorDark').value = preset.color;
        }
        if (preset.bg && presetKey !== 'custom') {
            document.getElementById('colorLight').value = preset.bg;
        }
        if (preset.crossType && presetKey !== 'custom') {
            document.getElementById('crossType').value = preset.crossType;
        }
       
        generateQR();
    }
    function randomUkrainian() {
        const styles = ['traditional', 'ethnic', 'festive', 'modern'];
        const random = styles[Math.floor(Math.random() * styles.length)];
        document.getElementById('stylePreset').value = random;
        applyPreset();
    }
    function resetColors() {
        const presetKey = document.getElementById('stylePreset').value;
        const preset = STYLE_PRESETS[presetKey];
        document.getElementById('colorDark').value = preset.color;
        document.getElementById('colorLight').value = preset.bg;
        document.getElementById('crossType').value = preset.crossType;
        document.getElementById('dotSize').value = 0.9;
        document.getElementById('logoSize').value = 0.25;
        // Скидання маски до значень за замовчуванням
        document.getElementById('maskType').value = 'none';
        document.getElementById('maskSize').value = 4;
        document.getElementById('maskOpacity').value = 0.7;
        document.getElementById('maskSizeValue').textContent = '4';
        document.getElementById('maskOpacityValue').textContent = '70';
        generateQR();
    }
    // Додаткові функції для оновлення відображення повзунків маски
    function updateMaskSize() {
        document.getElementById('maskSizeValue').textContent = document.getElementById('maskSize').value;
        generateQR();
    }
    function updateMaskOpacity() {
        const val = document.getElementById('maskOpacity').value;
        document.getElementById('maskOpacityValue').textContent = Math.round(val * 100);
        generateQR();
    }
    // ==================== ЗАВАНТАЖЕННЯ ====================
    function downloadPNG() {
        if (!currentSVG) { alert('QR ще не згенеровано'); return; }
        gtag('event', 'download_qr', { event_category: 'engagement', event_label: 'PNG' });
        const canvas = document.createElement('canvas');
        const size = 1000;  // Висока роздільна здатність
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(currentSVG.outerHTML)));
        img.onload = () => {
            ctx.drawImage(img, 0, 0, size, size);
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = 'qr-vyshyvanka-' + Date.now() + '.png';
            a.click();
        };
    }
    function downloadSVG() {
        if (!currentSVG) { alert('QR ще не згенеровано'); return; }
        gtag('event', 'download_qr', { event_category: 'engagement', event_label: 'SVG' });
        const blob = new Blob([currentSVG.outerHTML], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'qr-vyshyvanka-' + Date.now() + '.svg';
        a.click();
        URL.revokeObjectURL(url);
    }
    // ==================== ЛОГОТИП ====================
    document.getElementById('logoFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            currentLogo = event.target.result;
            document.getElementById('fileName').classList.add('show');
            generateQR();
        };
        reader.readAsDataURL(file);
    });
    // ==================== LIVE-ОНОВЛЕННЯ ====================
    document.getElementById('qrText').addEventListener('input', generateQR);
    document.getElementById('colorDark').addEventListener('input', generateQR);
    document.getElementById('colorLight').addEventListener('input', generateQR);
    document.getElementById('crossType').addEventListener('change', generateQR);
    document.getElementById('dotSize').addEventListener('input', generateQR);
    document.getElementById('logoSize').addEventListener('input', generateQR);
    // ==================== ІНІЦІАЛІЗАЦІЯ ====================
    window.addEventListener('load', () => {
        setTimeout(() => {
            if (typeof QRCode !== 'undefined') {
                generateQR();
            } else {
                const script = document.createElement('script');
                script.src = 'https://davidshimjs.github.io/qrcodejs/qrcode.min.js';
                script.onload = generateQR;
                document.head.appendChild(script);
            }
        }, 300);
    });
    console.log('%c🇺🇦 QR Вишиванка готовий!', 'color: #c41e3a; font-weight: bold;');
    console.log('%c💡 Хрестики мають бути видно при розмірі 85%+', 'color: #94a3b8;');
</script>
