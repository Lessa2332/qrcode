<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Designer Pro | Upload Edition</title>
    <!-- ✅ Виправлено: прибрано пробіли в URL -->
    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { display: grid; grid-template-columns: 380px 1fr; gap: 30px; max-width: 1100px; width: 100%; }
        .sidebar { background: var(--panel); padding: 25px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); height: fit-content; }
        .main-view { display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border-radius: 32px; padding: 40px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 1.5rem; margin-bottom: 25px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; opacity: 0.7; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; font-size: 14px; box-sizing: border-box; }
        input[type="file"] { font-size: 12px; color: #94a3b8; margin-top: 5px; }
        .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input[type="color"] { width: 100%; height: 45px; border: none; border-radius: 10px; cursor: pointer; background: #0f172a; padding: 5px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-magic { background: #6366f1; color: white; }
        .btn-magic:hover { background: #4f46e5; transform: translateY(-2px); }
        .btn-down { background: #10b981; color: white; margin-top: 20px; font-size: 16px; }
        .btn-down:hover { background: #059669; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        #qrcode { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 0 50px rgba(0,0,0,0.5); display: flex; justify-content: center; }
        canvas { border-radius: 8px; max-width: 100%; }
        .file-upload-wrapper { border: 2px dashed #334155; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; }
        .file-upload-wrapper:hover { border-color: var(--accent); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <h1>QR Designer ✨</h1>
        <div class="group">
            <label>Текст або URL</label>
            <input type="text" id="qrText" value="https://google.com" oninput="generate()">
        </div>
        <div class="group">
            <label>Власне лого (PNG/JPG)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="logoFile" accept="image/*" onchange="handleLogoUpload(this)">
            </div>
            <p id="fileName" style="font-size: 11px; color: #10b981; margin-top: 5px; display: none;">Лого завантажено ✅</p>
        </div>
        <div class="group">
            <label>Стиль пікселів</label>
            <select id="dotStyle" onchange="generate()">
                <option value="square">Квадрати (Classic)</option>
                <option value="dots">Точки (Minimal)</option>
                <option value="rounded">Закруглені (Modern)</option>
            </select>
        </div>
        <div class="group">
            <label>Колір QR-коду</label>
            <input type="color" id="colorDark" value="#6366f1" onchange="generate()">
            <label style="margin-top: 10px;">Колір фону</label>
            <input type="color" id="colorLight" value="#ffffff" onchange="generate()">
        </div>
        <button class="btn btn-magic" onclick="magicRandom()">Випадковий стиль 🎲</button>
    </div>
    <div class="main-view">
        <div id="qrcode"></div>
        <div style="width: 320px; margin-top: 20px;">
            <button class="btn btn-down" onclick="download()">Завантажити PNG ⬇️</button>
        </div>
    </div>
</div>

<script>
    let currentLogoBase64 = null;

    function handleLogoUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentLogoBase64 = e.target.result;
                document.getElementById('fileName').style.display = 'block';
                generate();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function magicRandom() {
        const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4'];
        document.getElementById('colorDark').value = colors[Math.floor(Math.random() * colors.length)];
        document.getElementById('dotStyle').value = ['square', 'dots', 'rounded'][Math.floor(Math.random() * 3)];
        generate();
    }

    function generate() {
        const container = document.getElementById("qrcode");
        container.innerHTML = "";
        
        const text = document.getElementById("qrText").value.trim();
        if (!text) return;
        
        new QRCode(container, {
            text: text,
            width: 400,
            height: 400,
            correctLevel: QRCode.CorrectLevel.H,
            // ✅ Кольори
            colorDark: document.getElementById("colorDark").value,
            colorLight: document.getElementById("colorLight").value,
            // ✅ Стиль точок
            dotStyle: document.getElementById("dotStyle").value,
            // ✅ Лого
            logo: currentLogoBase64 || null,
            logoWidth: 80,
            logoHeight: 80,
            logoBackgroundColor: '#ffffff',
            // ✅ Кутові маркери
            eyeOptions: {
                outer: { color: document.getElementById("colorDark").value },
                inner: { color: document.getElementById("colorDark").value }
            }
        });
    }

    function download() {
        const canvas = document.querySelector("#qrcode canvas");
        if (!canvas) return;
        const link = document.createElement('a');
        link.download = 'custom-qr-code.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    // ✅ Генеруємо при завантаженні сторінки
    window.addEventListener('load', generate);
</script>
</body>
</html>
